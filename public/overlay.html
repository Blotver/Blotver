<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Overlay</title>

    <style>
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
      }

      #clipContainer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .fade-in {
        animation: fadeIn 0.6s forwards;
      }

      .fade-out {
        animation: fadeOut 0.6s forwards;
      }

      .zoom-in {
        animation: zoomIn 0.6s forwards;
      }

      .zoom-out {
        animation: zoomOut 0.6s forwards;
      }

      .slide-in {
        animation: slideIn 0.6s forwards;
      }

      .slide-out {
        animation: slideOut 0.6s forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
        }

        to {
          opacity: 0;
        }
      }

      @keyframes zoomIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }

        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes zoomOut {
        from {
          transform: scale(1);
          opacity: 1;
        }

        to {
          transform: scale(0.8);
          opacity: 0;
        }
      }

      @keyframes slideIn {
        from {
          transform: translateY(50px);
          opacity: 0;
        }

        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      @keyframes slideOut {
        from {
          transform: translateY(0);
          opacity: 1;
        }

        to {
          transform: translateY(50px);
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <div id="clipContainer"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const projectId = window.location.pathname.split("/").pop();
      const socket = io();
      const container = document.getElementById("clipContainer");

      let queue = [];
      let playing = false;

      socket.on("connect", () => {
        console.log("🟢 Overlay conectado al socket:", socket.id);
        console.log("📌 Uniéndose al proyecto:", projectId);
        socket.emit("joinProject", projectId);
      });

      socket.on("newClip", (data) => {
        queue.push(data);
        processQueue();
      });

      function processQueue() {
        if (playing) return;
        if (queue.length === 0) return;

        const data = queue.shift();
        playClip(data);
      }

      function playClip(data) {
        if (!data.clipId) return;

        playing = true;
        container.innerHTML = "";

        const wrapper = document.createElement("div");
        wrapper.style.position = "absolute";
        wrapper.style.width = "100%";
        wrapper.style.height = "100%";
        wrapper.style.overflow = "hidden";

        // 🎬 TWITCH EMBED
        const iframe = document.createElement("iframe");

        iframe.src = `https://clips.twitch.tv/embed?clip=${data.clipId}&parent=blotver.onrender.com&autoplay=true`;
        iframe.allow = "autoplay; fullscreen";
        iframe.width = "100%";
        iframe.height = "100%";
        iframe.allowFullscreen = true;
        iframe.frameBorder = "0";
        iframe.style.position = "absolute";
        iframe.style.top = "0";
        iframe.style.left = "0";

        wrapper.appendChild(iframe);

        container.appendChild(wrapper);

        data.widgets.forEach((widget) => {
          if (widget.type === "image") {
            const img = document.createElement("img");

            img.src = widget.data.url;
            img.style.position = "absolute";
            img.style.left = widget.data.x + "px";
            img.style.top = widget.data.y + "px";
            img.style.width = widget.data.width + "px";
            img.style.height = widget.data.height + "px";
            img.style.objectFit = widget.data.objectFit || "cover";

            container.appendChild(img);
          }

          if (widget.type === "shoutout") {
            const text = document.createElement("div");

            let textTemplate =
              widget.data.overlayText ||
              widget.data.textTemplate ||
              "Sigan a {user} jugando {game}";

            textTemplate = textTemplate
              .replaceAll("{user}", data.user)
              .replaceAll("{game}", data.game);

            text.innerText = textTemplate;

            text.style.position = "absolute";
            text.style.left = widget.data.x + "px";
            text.style.top = widget.data.y + "px";

            text.style.fontSize = (widget.data.fontSize || 28) + "px";
            text.style.color = widget.data.textColor || "#ffffff";
            text.style.background =
              widget.data.backgroundColor || "transparent";
            text.style.borderRadius = (widget.data.borderRadius || 0) + "px";
            text.style.padding = "8px 12px";
            text.style.fontWeight = "bold";

            text.style.webkitTextStroke =
              (widget.data.strokeSize || 0) +
              "px " +
              (widget.data.strokeColor || "#000");

            container.appendChild(text);
          }
        });

        wrapper.className = `${data.animationIn || "fade"}-in`;

        setTimeout(
          () => {
            wrapper.className = `${data.animationOut || "fade"}-out`;

            setTimeout(() => {
              container.innerHTML = "";
              playing = false;
              processQueue();
            }, 600);
          },
          (data.duration || 10) * 1000,
        );
      }
    </script>
  </body>
</html>
