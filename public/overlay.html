<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Overlay</title>
  <link rel="stylesheet" href="/css/animations.css">
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
    }

    #clipContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .fade-in {
      animation: fadeIn 0.6s forwards;
    }

    .fade-out {
      animation: fadeOut 0.6s forwards;
    }

    .zoom-in {
      animation: zoomIn 0.6s forwards;
    }

    .zoom-out {
      animation: zoomOut 0.6s forwards;
    }

    .slide-in {
      animation: slideIn 0.6s forwards;
    }

    .slide-out {
      animation: slideOut 0.6s forwards;
    }
  </style>
</head>

<body>
  <div id="clipContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/styleEngine.js"></script>
  <script>
    const projectId = window.location.pathname.split("/").pop();
    const socket = io({
      transports: ["websocket"]
    });
    const container = document.getElementById("clipContainer");

    let queue = [];
    let playing = false;

    socket.on("connect", () => {
      console.log("🟢 Overlay conectado al socket:", socket.id);
      console.log("📌 Uniéndose al proyecto:", projectId);
      socket.emit("joinProject", projectId);
    });

    socket.on("newClip", (data) => {
      console.log("🎬 DATA RECIBIDA DEL SOCKET:", data);

      queue.push(data);
      processQueue();
    });

    function parseVariables(text, data) {
      if (!text) return "";

      const vars = {
        "{user}": data.user,
        "{userMention}": "@" + data.user,
        "{userUrl}": "https://twitch.tv/" + data.user,

        "{game}": data.game,

        "{clipUrl}": data.clipUrl,
        "{clipTitle}": data.clipTitle,
        "{clipViews}": data.clipViews,
        "{clipCreator}": data.clipCreator,

        "{channel}": data.channel,
        "{channelUrl}": "https://twitch.tv/" + data.channel,
      };

      Object.keys(vars).forEach((key) => {
        if (vars[key] !== undefined && vars[key] !== null) {
          text = text.replaceAll(key, vars[key]);
        }
      });

      return text;
    }

    function processQueue() {
      if (playing) return;
      if (queue.length === 0) return;

      const data = queue.shift();
      playClip(data);
    }

    function playClip(data) {
      if (!data.clipId) return;

      playing = true;
      container.innerHTML = "";

      const wrapper = document.createElement("div");
      wrapper.style.opacity = "0"
      wrapper.style.transition = "opacity 0.3s ease"
      wrapper.style.position = "absolute";
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      wrapper.style.left = (data.x * screenW) + "px";
      wrapper.style.top = (data.y * screenH) + "px";
      wrapper.style.width = (data.width * screenW) + "px";
      wrapper.style.height = (data.height * screenH) + "px";
      wrapper.style.overflow = "visible";
      wrapper.style.pointerEvents = "none";

      // 🎬 TWITCH EMBED
      const iframe = document.createElement("iframe");
      iframe.onload = () => {
        wrapper.style.opacity = "1"
      }

      iframe.src = `https://clips.twitch.tv/embed?clip=${data.clipId}&parent=blotver.onrender.com&autoplay=true`;
      iframe.allow = "autoplay; fullscreen";
      iframe.width = "100%";
      iframe.height = "100%";
      iframe.allowFullscreen = true;
      iframe.frameBorder = "0";
      iframe.style.position = "absolute";
      iframe.style.top = "0";
      iframe.style.left = "0";
      iframe.style.zIndex = "1";

      wrapper.appendChild(iframe);

      container.appendChild(wrapper);

      // 🎨 IMÁGENES HIJAS
      if (data.images && data.images.length) {

        data.images.forEach((imgData) => {

          const img = StyleEngine.createImage(imgData)

          img.style.zIndex = "5"

          img.style.position = "absolute"
          img.style.left = (imgData.x - data.x) * screenW + "px"
          img.style.top = (imgData.y - data.y) * screenH + "px"

          img.style.width = (imgData.width * screenW) + "px"
          img.style.height = (imgData.height * screenH) + "px"

          wrapper.appendChild(img)

        })
      }

      // 📝 TEXTOS HIJOS
      if (data.texts && data.texts.length) {

        data.texts.forEach((textData) => {

          const parsed = parseVariables(textData.text || "", data)

          const txtEl = StyleEngine.createText(textData, parsed)

          txtEl.style.position = "absolute"
          txtEl.style.left = (textData.x - data.x) * screenW + "px"
          txtEl.style.top = (textData.y - data.y) * screenH + "px"

          txtEl.style.width = (textData.width * screenW) + "px"
          txtEl.style.height = (textData.height * screenH) + "px"

          txtEl.style.zIndex = "6"

          wrapper.appendChild(txtEl)

        })
      }

      if (data.overlayText) {
        const text = document.createElement("div");

        const parsedText = parseVariables(data.overlayText, data);
        text.innerHTML = parsedText;

        text.style.position = "absolute";
        text.style.top = "20px";
        text.style.left = "50%";
        text.style.transform = "translateX(-50%)";
        text.style.color = "white";
        text.style.fontSize = "40px";
        text.style.fontWeight = "bold";
        text.style.textAlign = "center";
        text.style.zIndex = "5";

        wrapper.appendChild(text)
      }

      wrapper.className = `${data.animationIn || "fade"}-in`;

      setTimeout(
        () => {
          wrapper.className = `${data.animationOut || "fade"}-out`;

          setTimeout(() => {
            container.innerHTML = "";
            playing = false;
            processQueue();
          }, 600);
        },
        (data.duration || 10) * 1000,
      );
    }
  </script>
</body>

</html>
