<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Overlay</title>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        iframe {
            pointer-events: none;
        }

        #clipContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #clipContainer iframe {
            position: absolute;
            height: 110%;
            width: auto;
            min-width: 110%;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            border: none;
        }

        .fade-in {
            animation: fadeIn 0.6s forwards;
        }

        .fade-out {
            animation: fadeOut 0.6s forwards;
        }

        .zoom-in {
            animation: zoomIn 0.6s forwards;
        }

        .zoom-out {
            animation: zoomOut 0.6s forwards;
        }

        .slide-in {
            animation: slideIn 0.6s forwards;
        }

        .slide-out {
            animation: slideOut 0.6s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1
            }

            to {
                opacity: 0
            }
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes zoomOut {
            from {
                transform: scale(1);
                opacity: 1
            }

            to {
                transform: scale(0.8);
                opacity: 0
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes slideOut {
            from {
                transform: translateY(0);
                opacity: 1
            }

            to {
                transform: translateY(50px);
                opacity: 0
            }
        }
    </style>
</head>

<body>
    <div id="clipContainer">
        <div id="overlayText" style="position:absolute; top:5%; width:100%; text-align:center;
        font-size:48px; color:white; font-weight:bold; text-shadow:0 0 20px black;">
        </div>
    </div>

    <script>
        const projectId = window.location.pathname.split("/").pop();
        const socket = io();
        const container = document.getElementById("clipContainer");

        let playing = false;

        socket.emit("joinProject", projectId);

        console.log("overlay connected, projectId=", projectId);

        socket.on("connect", () => console.log("socket.io connected", socket.id));

        function playClip(data) {

            if (playing) return;
            playing = true;

            if (data.isTest) {
                const badge = document.createElement("div");
                badge.innerText = "TEST MODE";
                badge.style.position = "absolute";
                badge.style.top = "10px";
                badge.style.right = "10px";
                badge.style.background = "red";
                badge.style.padding = "6px 12px";
                badge.style.fontSize = "14px";
                badge.style.fontWeight = "bold";
                container.appendChild(badge);
            }
            document.getElementById("overlayText").innerText =
                data.overlayText || "";

            container.innerHTML = `
        <iframe
            src="https://clips.twitch.tv/embed?clip=${data.clipId}&parent=${window.location.hostname}&autoplay=true&muted=true"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
        <div id="overlayText"
            style="position:absolute; top:5%; width:100%; text-align:center;
            font-size:48px; color:white; font-weight:bold;
            text-shadow:0 0 20px black;">
            ${data.overlayText || ""}
        </div>
    `;

            container.className = `${data.animationIn || "fade"}-in`;

            setTimeout(() => {
                container.className = `${data.animationOut || "fade"}-out`;
            }, (data.duration || 10000) - 600);

            setTimeout(reset, data.duration || 10000);
        }

        socket.on("newClip", (data) => {
            playClip(data);
        });

        socket.on("widgetEvent", (payload) => {

            if (payload.type === "shoutout") {

                const d = payload.data;
                const t = payload.testData || {};

                playClip({
                    clipId: t.clipId || null,
                    overlayText: d.overlayText || "",
                    duration: d.duration,
                    animationIn: d.animationIn,
                    animationOut: d.animationOut
                });
            }


        });

        function reset() {
            container.innerHTML = "";
            playing = false;
        }
    </script>
</body>

</html>
