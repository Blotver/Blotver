<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Overlay</title>
  <link rel="stylesheet" href="/css/animations.css">

  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
    }

    #root {
      position: absolute;
      inset: 0;
      overflow: visible;
    }

    .fade-in { animation: fadeIn 0.6s forwards; }
    .fade-out { animation: fadeOut 0.6s forwards; }

    .zoom-in { animation: zoomIn 0.6s forwards; }
    .zoom-out { animation: zoomOut 0.6s forwards; }

    .slide-in { animation: slideIn 0.6s forwards; }
    .slide-out { animation: slideOut 0.6s forwards; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/styleEngine.js"></script>

  <script>
    const projectId = window.location.pathname.split("/").pop();
    const socket = io({ transports: ["websocket"] });

    const root = document.getElementById("root");

    let queue = [];
    let playing = false;

    // 🔌 CONNECT
    socket.on("connect", () => {
      console.log("🟢 Overlay conectado:", socket.id);
      socket.emit("joinProject", projectId);
    });

    // 🎬 EVENTO NUEVO CLIP
    socket.on("newClip", (data) => {
      console.log("🎬 NEW CLIP:", data);
      queue.push(data);
      processQueue();
    });

    // 🔁 VARIABLES
    function parseVariables(text, data) {
      if (!text) return "";

      const vars = {
        "{user}": data.user,
        "{userMention}": "@" + data.user,
        "{userUrl}": "https://twitch.tv/" + data.user,

        "{game}": data.game,

        "{clipUrl}": data.clipUrl,
        "{clipTitle}": data.clipTitle,
        "{clipViews}": data.clipViews,
        "{clipCreator}": data.clipCreator,

        "{channel}": data.channel,
        "{channelUrl}": "https://twitch.tv/" + data.channel,
      };

      Object.keys(vars).forEach((key) => {
        if (vars[key] != null) {
          text = text.replaceAll(key, vars[key]);
        }
      });

      return text;
    }

    // 🔁 COLA
    function processQueue() {
      if (playing) return;
      if (queue.length === 0) return;

      const data = queue.shift();
      playClip(data);
    }

    // 🧱 RENDER HIJOS (FULL MODULAR)
    function renderChildren(parent, data) {
      if (!data.children) return;

      data.children.forEach(child => {
        const el = document.createElement("div");

        el.style.position = "absolute";
        el.style.left = (child.x * 100) + "%";
        el.style.top = (child.y * 100) + "%";
        el.style.width = (child.width * 100) + "%";
        el.style.height = (child.height * 100) + "%";

        // 👇 tipo de widget hijo
        if (child.type === "text") {

          el.innerHTML = parseVariables(child.text, data);

          StyleEngine.applyText(el, child);
          StyleEngine.applyTextContainer(el, child);

        }

        if (child.type === "image") {

          const img = document.createElement("img");
          img.style.width = "100%";
          img.style.height = "100%";

          StyleEngine.applyImage(img, child);

          el.appendChild(img);
        }

        parent.appendChild(el);
      });
    }

    // 🎬 PLAY
    function playClip(data) {
      if (!data.clipId) return;

      playing = true;
      root.innerHTML = "";

      const wrapper = document.createElement("div");

      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      wrapper.style.position = "absolute";
      wrapper.style.left = (data.x * screenW) + "px";
      wrapper.style.top = (data.y * screenH) + "px";
      wrapper.style.width = (data.width * screenW) + "px";
      wrapper.style.height = (data.height * screenH) + "px";
      wrapper.style.pointerEvents = "none";
      wrapper.style.opacity = "0";
      wrapper.style.transition = "opacity 0.3s ease";

      // 🎥 CLIP
      const iframe = document.createElement("iframe");

      iframe.src = `https://clips.twitch.tv/embed?clip=${data.clipId}&parent=blotver.onrender.com&autoplay=true`;
      iframe.allow = "autoplay; fullscreen";
      iframe.width = "100%";
      iframe.height = "100%";
      iframe.frameBorder = "0";

      iframe.style.position = "absolute";
      iframe.style.inset = "0";
      iframe.style.zIndex = "1";

      iframe.onload = () => {
        wrapper.style.opacity = "1";
      };

      wrapper.appendChild(iframe);

      // 🧠 TEXTO PRINCIPAL (opcional)
      if (data.overlayText) {

        const text = document.createElement("div");

        text.innerHTML = parseVariables(data.overlayText, data);

        text.style.position = "absolute";
        text.style.top = "20px";
        text.style.left = "50%";
        text.style.transform = "translateX(-50%)";
        text.style.zIndex = "5";

        StyleEngine.applyText(text, data);
        StyleEngine.applyTextContainer(text, data);

        wrapper.appendChild(text);
      }

      // 🧱 HIJOS (LO IMPORTANTE)
      renderChildren(wrapper, data);

      root.appendChild(wrapper);

      // 🎞 ANIMACIÓN
      wrapper.className = `${data.animationIn || "fade"}-in`;

      setTimeout(() => {
        wrapper.className = `${data.animationOut || "fade"}-out`;

        setTimeout(() => {
          root.innerHTML = "";
          playing = false;
          processQueue();
        }, 600);

      }, (data.duration || 10) * 1000);
    }
  </script>
</body>
</html>
