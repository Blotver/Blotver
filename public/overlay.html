<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Overlay</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
    }

    #clipContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .fade-in {
      animation: fadeIn 0.6s forwards;
    }

    .fade-out {
      animation: fadeOut 0.6s forwards;
    }

    .zoom-in {
      animation: zoomIn 0.6s forwards;
    }

    .zoom-out {
      animation: zoomOut 0.6s forwards;
    }

    .slide-in {
      animation: slideIn 0.6s forwards;
    }

    .slide-out {
      animation: slideOut 0.6s forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes zoomOut {
      from {
        transform: scale(1);
        opacity: 1;
      }

      to {
        transform: scale(0.8);
        opacity: 0;
      }
    }

    @keyframes slideIn {
      from {
        transform: translateY(50px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      from {
        transform: translateY(0);
        opacity: 1;
      }

      to {
        transform: translateY(50px);
        opacity: 0;
      }
    }

    .anim-none {}

    .anim-shake {
      display: inline-block;
      animation: shake 0.6s infinite;
    }

    @keyframes shake {
      0% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-2px)
      }

      50% {
        transform: translateX(2px)
      }

      75% {
        transform: translateX(-2px)
      }

      100% {
        transform: translateX(0)
      }
    }

    .anim-bounce {
      display: inline-block;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-8px)
      }
    }

    .anim-glow {
      animation: glow 1.5s infinite alternate;
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 2px white)
      }

      to {
        filter: drop-shadow(0 0 10px white)
      }
    }

    .anim-wave {
      display: inline-block;
      animation: wave 1.2s infinite;
    }

    @keyframes wave {
      0% {
        transform: rotate(0deg)
      }

      25% {
        transform: rotate(3deg)
      }

      50% {
        transform: rotate(-3deg)
      }

      75% {
        transform: rotate(3deg)
      }

      100% {
        transform: rotate(0deg)
      }
    }
  </style>
</head>

<body>
  <div id="clipContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const projectId = window.location.pathname.split("/").pop();
    const socket = io({
      transports: ["websocket"]
    });
    const container = document.getElementById("clipContainer");

    let queue = [];
    let playing = false;

    socket.on("connect", () => {
      console.log("🟢 Overlay conectado al socket:", socket.id);
      console.log("📌 Uniéndose al proyecto:", projectId);
      socket.emit("joinProject", projectId);
    });

    socket.on("newClip", (data) => {
      console.log("🎬 DATA RECIBIDA DEL SOCKET:", data);

      queue.push(data);
      processQueue();
    });

    function parseVariables(text, data) {
      if (!text) return "";

      const vars = {
        "{user}": data.user,
        "{userMention}": "@" + data.user,
        "{userUrl}": "https://twitch.tv/" + data.user,

        "{game}": data.game,

        "{clipUrl}": data.clipUrl,
        "{clipTitle}": data.clipTitle,
        "{clipViews}": data.clipViews,
        "{clipCreator}": data.clipCreator,

        "{channel}": data.channel,
        "{channelUrl}": "https://twitch.tv/" + data.channel,
      };

      Object.keys(vars).forEach((key) => {
        if (vars[key] !== undefined && vars[key] !== null) {
          text = text.replaceAll(key, vars[key]);
        }
      });

      return text;
    }

    function processQueue() {
      if (playing) return;
      if (queue.length === 0) return;

      const data = queue.shift();
      playClip(data);
    }

    function playClip(data) {
      if (!data.clipId) return;

      playing = true;
      container.innerHTML = "";

      const wrapper = document.createElement("div");
      wrapper.style.opacity = "0"
      wrapper.style.transition = "opacity 0.3s ease"
      wrapper.style.position = "absolute";
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      wrapper.style.left = (data.x * screenW) + "px";
      wrapper.style.top = (data.y * screenH) + "px";
      wrapper.style.width = (data.width * screenW) + "px";
      wrapper.style.height = (data.height * screenH) + "px";
      wrapper.style.overflow = "visible";
      wrapper.style.pointerEvents = "none";

      // 🎬 TWITCH EMBED
      const iframe = document.createElement("iframe");
      iframe.onload = () => {
        wrapper.style.opacity = "1"
      }

      iframe.src = `https://clips.twitch.tv/embed?clip=${data.clipId}&parent=blotver.onrender.com&autoplay=true`;
      iframe.allow = "autoplay; fullscreen";
      iframe.width = "100%";
      iframe.height = "100%";
      iframe.allowFullscreen = true;
      iframe.frameBorder = "0";
      iframe.style.position = "absolute";
      iframe.style.top = "0";
      iframe.style.left = "0";
      iframe.style.zIndex = "1";

      wrapper.appendChild(iframe);

      container.appendChild(wrapper);

      // 🎨 IMÁGENES HIJAS
      if (data.images && data.images.length) {
        console.log("🖼️ Renderizando imágenes:", data.images);

        data.images.forEach((imgData) => {

          const img = document.createElement("img");

          img.src = imgData.url;

          img.style.zIndex = "5";

          img.style.position = "absolute";
          img.style.left = (imgData.x - data.x) * screenW + "px";
          img.style.top = (imgData.y - data.y) * screenH + "px";

          img.style.width = (imgData.width * screenW) + "px";
          img.style.height = (imgData.height * screenH) + "px";

          img.style.objectFit = imgData.objectFit || "cover";
          img.style.pointerEvents = "none";

          wrapper.appendChild(img); // 👈 CAMBIO

        });
      }

      // 📝 TEXTOS HIJOS
      if (data.texts && data.texts.length) {
        console.log("📝 Renderizando textos:", data.texts);

        data.texts.forEach((textData) => {

          const txt = document.createElement("div");

          const parsed = parseVariables(textData.text || "", data);

          txt.innerHTML = parsed;

          if (textData.animation && textData.animation !== "none") {
            txt.classList.add("anim-" + textData.animation);
          }

          txt.style.zIndex = "6";

          txt.style.position = "absolute";
          txt.style.left = (textData.x - data.x) * screenW + "px";
          txt.style.top = (textData.y - data.y) * screenH + "px";

          txt.style.width = (textData.width * screenW) + "px";
          txt.style.height = (textData.height * screenH) + "px";

          txt.style.color = textData.textColor || "white";
          txt.style.fontSize = (textData.fontSize || 30) + "px";
          txt.style.fontWeight = textData.fontWeight || "bold";
          txt.style.textAlign = textData.textAlign || "center";

          wrapper.appendChild(txt); // 👈 CAMBIO

        });
      }

      if (data.overlayText) {
        const text = document.createElement("div");

        const parsedText = parseVariables(data.overlayText, data);
        text.innerHTML = parsedText;

        text.style.position = "absolute";
        text.style.top = "20px";
        text.style.left = "50%";
        text.style.transform = "translateX(-50%)";
        text.style.color = "white";
        text.style.fontSize = "40px";
        text.style.fontWeight = "bold";
        text.style.textAlign = "center";
        text.style.zIndex = "5";

        wrapper.appendChild(text)
      }

      wrapper.className = `${data.animationIn || "fade"}-in`;

      setTimeout(
        () => {
          wrapper.className = `${data.animationOut || "fade"}-out`;

          setTimeout(() => {
            container.innerHTML = "";
            playing = false;
            processQueue();
          }, 600);
        },
        (data.duration || 10) * 1000,
      );
    }
  </script>
</body>

</html>
