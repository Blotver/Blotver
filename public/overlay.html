<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Overlay</title>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        iframe {
            pointer-events: none;
        }

        #clipContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #clipContainer iframe {
            position: absolute;
            height: 110%;
            width: auto;
            min-width: 110%;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            border: none;
        }

        .fade-in {
            animation: fadeIn 0.6s forwards;
        }

        .fade-out {
            animation: fadeOut 0.6s forwards;
        }

        .zoom-in {
            animation: zoomIn 0.6s forwards;
        }

        .zoom-out {
            animation: zoomOut 0.6s forwards;
        }

        .slide-in {
            animation: slideIn 0.6s forwards;
        }

        .slide-out {
            animation: slideOut 0.6s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1
            }

            to {
                opacity: 0
            }
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.8);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        @keyframes zoomOut {
            from {
                transform: scale(1);
                opacity: 1
            }

            to {
                transform: scale(0.8);
                opacity: 0
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes slideOut {
            from {
                transform: translateY(0);
                opacity: 1
            }

            to {
                transform: translateY(50px);
                opacity: 0
            }
        }
    </style>
</head>

<body>
    <div class="project-card relative bg-gradient-to-br from-gray-900 to-gray-800 
            border border-gray-800 hover:border-purple-500/40
            rounded-2xl p-6 transition-all cursor-pointer group" data-id="${project._id}">

        <!-- TITLE -->
        <h3 class="text-lg font-semibold text-gray-200 group-hover:text-white transition">
            ${project.name}
        </h3>

        <!-- 3 DOT MENU -->
        <div class="absolute bottom-4 right-4">

            <button onclick="toggleProjectMenu(event, '${project._id}')" class="w-8 h-8 flex items-center justify-center rounded-lg 
                   hover:bg-gray-700 transition text-gray-400 hover:text-white">

                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="5" r="1.5" />
                    <circle cx="12" cy="12" r="1.5" />
                    <circle cx="12" cy="19" r="1.5" />
                </svg>

            </button>

            <!-- DROPDOWN -->
            <div id="menu-${project._id}" class="hidden absolute right-0 bottom-10 
                   bg-gray-900 border border-gray-700 
                   rounded-lg shadow-xl w-32 overflow-hidden">

                <button onclick="deleteProject('${project._id}')" class="w-full text-left px-4 py-2 text-sm 
                       text-red-400 hover:bg-red-500/10 transition">
                    Eliminar
                </button>

            </div>

        </div>
    </div>
    <!-- CREATE PROJECT MODAL -->
    <div id="projectTypeModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm 
            flex items-center justify-center z-50">

        <div class="bg-gray-900 border border-gray-800 rounded-2xl 
                w-[600px] p-8">

            <h2 class="text-xl font-semibold mb-6">
                Create New Project
            </h2>

            <div class="grid grid-cols-2 gap-4">

                <!-- BLANK -->
                <div onclick="createProjectType('blank')" class="p-6 bg-gray-800 hover:bg-gray-700 
                        rounded-xl cursor-pointer transition border border-transparent hover:border-purple-500/40">

                    <h3 class="font-medium mb-2">Blank Overlay</h3>
                    <p class="text-sm text-gray-400">
                        Start from scratch.
                    </p>
                </div>

                <!-- SHOUTOUT -->
                <div onclick="createProjectType('shoutout')" class="p-6 bg-gray-800 hover:bg-gray-700 
                        rounded-xl cursor-pointer transition border border-transparent hover:border-purple-500/40">

                    <h3 class="font-medium mb-2">ShoutOut Widget</h3>
                    <p class="text-sm text-gray-400">
                        Automatic shoutout system with clips.
                    </p>
                </div>

                <!-- VOICE -->
                <div onclick="createProjectType('voice')" class="p-6 bg-gray-800 hover:bg-gray-700 
                        rounded-xl cursor-pointer transition border border-transparent hover:border-purple-500/40">

                    <h3 class="font-medium mb-2">Voice Message</h3>
                    <p class="text-sm text-gray-400">
                        Text-to-speech alerts.
                    </p>
                </div>

            </div>

            <button onclick="closeProjectModal()" class="mt-6 text-sm text-gray-400 hover:text-white">
                Cancel
            </button>

        </div>
    </div>
    <script>
        function openProjectModal() {
            document.getElementById("projectTypeModal")
                .classList.remove("hidden");
        }

        function closeProjectModal() {
            document.getElementById("projectTypeModal")
                .classList.add("hidden");
        }
        function toggleProjectMenu(event, id) {
            event.stopPropagation();

            document.querySelectorAll('[id^="menu-"]')
                .forEach(m => {
                    if (m.id !== `menu-${id}`) {
                        m.classList.add("hidden");
                    }
                });

            const menu = document.getElementById(`menu-${id}`);
            menu.classList.toggle("hidden");
        }

        window.addEventListener("click", () => {
            document.querySelectorAll('[id^="menu-"]')
                .forEach(m => m.classList.add("hidden"));
        });

        app.delete("/api/projects/:id", isAuthenticated, async (req, res) => {

            await Widget.deleteMany({ projectId: req.params.id });

            await Project.deleteOne({
                _id: req.params.id,
                userId: req.session.user.id
            });

            res.json({ success: true });
        });
        async function createProjectType(type) {

            const res = await fetch("/api/projects", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: "Untitled Project",
                    type: type
                })
            });

            const project = await res.json();

            window.location.href = `/dashboard/project/${project._id}`;
        }
        const projectId = window.location.pathname.split("/").pop();
        const socket = io();
        const container = document.getElementById("clipContainer");

        let playing = false;

        socket.emit("joinProject", projectId);

        console.log("overlay connected, projectId=", projectId);

        socket.on("connect", () => console.log("socket.io connected", socket.id));

        socket.on("newClip", (data) => {

            if (playing) return;
            playing = true;

            document.getElementById("overlayText").innerText = data.overlayText || "";

            container.innerHTML += `
    <iframe
        src="https://clips.twitch.tv/embed?clip=${data.clipId}&parent=blotver.onrender.com&autoplay=true&muted=true"
        allow="autoplay; fullscreen"
        allowfullscreen>
    </iframe>
`;
            container.className = `${data.animationIn}-in`;
            setTimeout(() => {
                container.className = `${data.animationOut}-out`;
            }, data.duration - 600);

            setTimeout(reset, data.duration);

        });

        function reset() {
            container.innerHTML = "";
            playing = false;
        }
    </script>
</body>

</html>
