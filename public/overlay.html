<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Overlay</title>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        iframe {
            pointer-events: none;
        }

        #clipContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #clipContainer iframe {
            position: absolute;
            width: 120%;
            height: 130%;
            top: -18%;
            left: -10%;
            border: none;
        }
    </style>
</head>

<body>
    <div id="clipContainer"></div>

    <script>
        const projectId = window.location.pathname.split("/").pop();
        const socket = io();
        const container = document.getElementById("clipContainer");

        let playing = false;

        socket.emit("joinProject", projectId);

        console.log("overlay connected, projectId=", projectId);

        socket.on("connect", () => console.log("socket.io connected", socket.id));

        socket.on("newClip", (data) => {

            console.log("received newClip event", data);

            if (playing) return;
            playing = true;

            container.innerHTML = `
    <iframe
        src="https://clips.twitch.tv/embed?clip=${data.clipId}&parent=blotver.onrender.com&autoplay=true&muted=true"
        allow="autoplay; fullscreen"
        allowfullscreen>
    </iframe>
`;

            // Esperamos 2 segundos a que desaparezca la UI
            setTimeout(() => {
                const frame = document.getElementById("clipFrame");
                if (frame) frame.style.opacity = "1";
            }, 3500);

            setTimeout(reset, (data.duration * 1000) || 15000);
        });

        function reset() {
            container.innerHTML = "";
            playing = false;
        }
    </script>
</body>

</html>
