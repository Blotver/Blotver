<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Overlay</title>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        body {
            margin: 0;
            background: transparent;
            overflow: hidden;
        }

        iframe {
            pointer-events: none;
        }

        /* container for the clip video – give it a fixed size or make it fill the screen */
        #clipContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* let clicks pass through if you stack other UI */
            overflow: hidden;
        }

    </style>
</head>

<body>
    <div id="clipContainer"></div>

    <script>
        const projectId = window.location.pathname.split("/").pop();
        const socket = io();
        const container = document.getElementById("clipContainer");

        let playing = false;

        socket.emit("joinProject", projectId);

        console.log("overlay connected, projectId=", projectId);

        socket.on("connect", () => console.log("socket.io connected", socket.id));

        socket.on("newClip", (data) => {

            console.log("received newClip event", data);

            if (playing) return;
            playing = true;

            container.innerHTML = `
        <iframe
            src="https://clips.twitch.tv/embed?clip=${data.clipId}&parent=blotver.onrender.com"
            width="100%"
            height="100%"
            frameborder="0"
            allowfullscreen>
        </iframe>
    `;

            // Como no podemos detectar cuándo termina el clip en un iframe,
            // lo limpiamos usando la duración.
            setTimeout(reset, (data.duration * 1000) || 15000);
        });

        function reset() {
            container.innerHTML = "";
            playing = false;
        }
    </script>
</body>

</html>
