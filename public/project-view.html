<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Project Editor</title>
    <link href="/styles.css" rel="stylesheet">

    <style>
        .selected-widget {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }

        .layer-item.active {
            background: #1f2937;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ===== SLIDE SIDEBAR SYSTEM ===== */

        #sidePanel {
            overflow: hidden;
            position: relative;
        }

        .sidebar-wrapper {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.35s cubic-bezier(.4, 0, .2, 1);
        }

        .panel {
            width: 50%;
            padding: 16px;
            overflow-y: auto;
        }

        .panel::-webkit-scrollbar {
            display: none;
        }

        .panel {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .show-settings .sidebar-wrapper {
            transform: translateX(-50%);
        }

        .sidebar-header {
            height: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            border-bottom: 1px solid #1f2937;
            cursor: pointer;
            font-size: 14px;
            color: #9ca3af;
            background: #111827;
        }

        .sidebar-header:hover {
            background: #1f2937;
        }

        .sidebar-header svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s ease;
        }

        .show-settings .sidebar-header svg {
            transform: rotate(180deg);
        }
    </style>
</head>

<body class="bg-gray-950 text-white overflow-hidden">

    <!-- ================= HEADER ================= -->
    <header
        class="fixed top-0 left-0 w-full h-16 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-6 z-50">

        <div class="flex items-center gap-4">

            <button onclick="goBack()"
                class="text-gray-400 hover:text-white w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-800 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <input id="projectNameInput"
                class="bg-transparent border-b border-gray-600 focus:border-purple-500 outline-none text-lg w-64"
                placeholder="Untitled Overlay">

            <div>
                <span class="text-xs text-gray-400 block">Overlay URL</span>
                <input id="overlayLink" class="bg-gray-800 text-xs px-3 py-1 rounded w-[380px]" readonly>
            </div>
        </div>

        <button onclick="saveConfig()" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded">
            Save
        </button>
    </header>

    <!-- ================= MAIN ================= -->
    <div class="pt-16 h-screen flex">

        <!-- SIDEBAR -->
        <aside id="sidePanel" class="w-72 bg-gray-900 border-r border-gray-800 flex flex-col">

            <div class="sidebar-header" onclick="showLayers()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
                <span id="sidebarTitle">Layers</span>
            </div>

            <div class="sidebar-wrapper">

                <!-- LAYERS PANEL -->
                <div class="panel no-scrollbar">
                    <h3 class="text-xs text-gray-400 mb-3">LAYERS</h3>
                    <div id="layersPanel" class="flex flex-col gap-1"></div>
                </div>

                <!-- SETTINGS PANEL -->
                <div class="panel no-scrollbar">
                    <h3 class="text-sm font-semibold mb-4 text-gray-300">Settings</h3>
                    <div id="configContent"></div>
                </div>

            </div>
        </aside>

        <!-- CANVAS -->
        <main class="flex-1 relative bg-white overflow-hidden"
            style="background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px;">

            <div id="canvas" class="w-full h-full relative"></div>

            <button id="newWidgetBtn"
                class="fixed bottom-8 left-1/2 -translate-x-1/2 w-16 h-16 bg-purple-600 hover:bg-purple-700 rounded-full shadow-2xl flex items-center justify-center z-40">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            </button>

            <div id="widgetSelector"
                class="hidden fixed bottom-28 left-1/2 -translate-x-1/2 bg-gray-900 border border-gray-700 rounded-xl shadow-xl p-4 flex flex-col gap-2 w-56 z-40">
                <div onclick="createWidget('text')" class="p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">
                    Text</div>
                <div onclick="createWidget('image')" class="p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">
                    Image</div>
                <div onclick="createWidget('shoutout')"
                    class="p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">Shoutout</div>
            </div>

        </main>
    </div>

    <script>

        const projectId = window.location.pathname.split("/").pop();
        document.getElementById("overlayLink").value =
            window.location.origin + "/overlay/" + projectId;

        function goBack() { window.location.href = "/dashboard"; }

        let widgets = [];
        let selectedWidget = null;
        let selectedElement = null;

        /* ================= LOAD ================= */

        async function loadWidgets() {
            const res = await fetch(`/api/widgets/${projectId}`);
            widgets = await res.json();

            const canvas = document.getElementById("canvas");
            const layersPanel = document.getElementById("layersPanel");

            canvas.innerHTML = "";
            layersPanel.innerHTML = "";

            widgets.forEach(widget => {

                const el = document.createElement("div");

                if (widget.type === "text") {
                    el.innerText = widget.data.text || "Sample Text";
                }

                if (widget.type === "image") {
                    const img = document.createElement("img");
                    img.src = widget.data.url || "https://via.placeholder.com/150";
                    img.style.width = (widget.data.width || 150) + "px";
                    img.style.height = (widget.data.height || 150) + "px";
                    el.appendChild(img);
                }

                if (widget.type === "shoutout") {
                    el.innerText = "🎬 ShoutOut Widget";
                    el.style.border = "2px solid purple";
                    el.style.padding = "8px 12px";
                }

                el.className = "absolute cursor-move select-none";
                el.style.left = (widget.data.x || 100) + "px";
                el.style.top = (widget.data.y || 100) + "px";
                el.style.color = widget.data.color ?? "#000";
                el.style.fontSize = (widget.data.fontSize || 32) + "px";

                enableDrag(el, widget);

                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectWidget(widget, el);
                });

                canvas.appendChild(el);

                const layerItem = document.createElement("div");
                layerItem.className = "layer-item px-3 py-2 rounded bg-gray-800 hover:bg-gray-700 cursor-pointer text-sm";
                layerItem.innerText = widget.name || widget.type;

                layerItem.addEventListener("click", () => {
                    selectWidget(widget, el);
                });

                layersPanel.appendChild(layerItem);

            });
        }

        /* ================= SELECT ================= */

        function selectWidget(widget, element) {

            if (selectedElement) selectedElement.style.outline = "none";

            selectedWidget = widget;
            selectedElement = element;

            element.style.outline = "2px solid #3b82f6";
            element.style.outlineOffset = "2px";

            openConfig(widget);

        }

        function showLayers() {
            document.getElementById("sidePanel").classList.remove("show-settings");
            document.getElementById("sidebarTitle").innerText = "Layers";

            if (selectedElement) selectedElement.style.outline = "none";
            selectedWidget = null;
            selectedElement = null;
        }

        function openConfig(widget) {

            document.getElementById("sidePanel").classList.add("show-settings");
            document.getElementById("sidebarTitle").innerText = widget.name || widget.type;

            const content = document.getElementById("configContent");

            if (widget.type === "shoutout") {

                content.innerHTML = `
<label class="block mb-2 text-sm">Command</label>
<input id="cfgCommand" class="w-full mb-4 p-2 bg-gray-800 rounded"
value="${widget.data.command || "!so"}">

<label class="block mb-2 text-sm">Template</label>
<textarea id="cfgTemplate"
class="w-full mb-4 p-2 bg-gray-800 rounded">${widget.data.textTemplate || ""}</textarea>
`;

                document.getElementById("cfgCommand")
                    .addEventListener("input", e => updateWidget({ command: e.target.value }));

                document.getElementById("cfgTemplate")
                    .addEventListener("input", e => updateWidget({ textTemplate: e.target.value }));

            }

        }

        // ================= SELECT SYSTEM =================

        function selectWidget(widget, element) {

            if (selectedElement) selectedElement.style.outline = "none";

            selectedWidget = widget;
            selectedElement = element;

            element.style.outline = "2px solid #3b82f6";
            element.style.outlineOffset = "2px";

            openConfig(widget);

        }

        function showLayers() {
            document.getElementById("sidePanel").classList.remove("show-settings");
            document.getElementById("sidebarTitle").innerText = "Layers";

            if (selectedElement) selectedElement.style.outline = "none";
            selectedWidget = null;
            selectedElement = null;
        }

        function openConfig(widget) {

            document.getElementById("sidePanel").classList.add("show-settings");
            document.getElementById("sidebarTitle").innerText = widget.name || widget.type;

            const content = document.getElementById("configContent");

            if (widget.type === "shoutout") {


                content.innerHTML = `
                    <label class="block mb-2 text-sm">Command</label>
                    <input id="cfgCommand"
                        class="w-full mb-4 p-2 bg-gray-800 rounded"
                        value="${widget.data.command || "!so"}">

                    <label class="block mb-2 text-sm">Chat Message Template</label>
                    <textarea id="cfgTemplate"
                        class="w-full mb-4 p-2 bg-gray-800 rounded">${widget.data.textTemplate || ""}</textarea>

                    <label class="block mb-2 text-sm">Duration (ms)</label>
                    <input id="cfgDuration"
                        type="number"
                        class="w-full mb-4 p-2 bg-gray-800 rounded"
                        value="${widget.data.duration || 10000}">

                    <label class="block mb-2 text-sm">Overlay Text</label>
                    <input id="cfgOverlayText"
                        class="w-full mb-4 p-2 bg-gray-800 rounded"
                        value="${widget.data.overlayText || ""}">

                    <label class="block mb-2 text-sm">Animation In</label>
                    <select id="cfgAnimIn"
                        class="w-full mb-4 p-2 bg-gray-800 rounded">
                        <option value="fade">Fade</option>
                        <option value="zoom">Zoom</option>
                        <option value="slide">Slide</option>
                    </select>

                    <label class="block mb-2 text-sm">Animation Out</label>
                    <select id="cfgAnimOut"
                        class="w-full mb-4 p-2 bg-gray-800 rounded">
                        <option value="fade">Fade</option>
                        <option value="zoom">Zoom</option>
                        <option value="slide">Slide</option>
                    </select>
                `;

                // Listeners
                document.getElementById("cfgCommand")
                    .addEventListener("input", e =>
                        updateSelectedWidget({ command: e.target.value })
                    );

                document.getElementById("cfgTemplate")
                    .addEventListener("input", e =>
                        updateSelectedWidget({ textTemplate: e.target.value })
                    );

                document.getElementById("cfgDuration")
                    .addEventListener("input", e =>
                        updateSelectedWidget({ duration: parseInt(e.target.value) })
                    );

                document.getElementById("cfgOverlayText")
                    .addEventListener("input", e =>
                        updateSelectedWidget({ overlayText: e.target.value })
                    );
            }
        }

        /* ================= UPDATE ================= */

        async function updateWidget(updates) {

            if (!selectedWidget) return;

            const updatedData = { ...selectedWidget.data, ...updates };

            const res = await fetch(`/api/widgets/${selectedWidget._id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: updatedData })
            });

            selectedWidget = await res.json();
        }

        /* ================= DRAG ================= */

        function enableDrag(el, widget) {
            let offsetX, offsetY, isDragging = false;

            el.addEventListener("mousedown", (e) => {
                isDragging = true;
                offsetX = e.offsetX;
                offsetY = e.offsetY;
            });

            document.addEventListener("mousemove", (e) => {
                if (!isDragging) return;

                const rect = document.getElementById("canvas").getBoundingClientRect();
                let x = e.clientX - rect.left - offsetX;
                let y = e.clientY - rect.top - offsetY;

                el.style.left = x + "px";
                el.style.top = y + "px";
            });

            document.addEventListener("mouseup", async () => {
                if (!isDragging) return;
                isDragging = false;

                await updateWidget({
                    x: parseInt(el.style.left),
                    y: parseInt(el.style.top)
                });
            });
        }

        /* ================= ADD ================= */

        document.getElementById("newWidgetBtn")
            .addEventListener("click", () => {
                document.getElementById("widgetSelector").classList.toggle("hidden");
            });

        async function createWidget(type) {
            document.getElementById("widgetSelector").classList.add("hidden");

            await fetch("/api/widgets", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ projectId, type })
            });

            loadWidgets();
        }

        loadWidgets();

    </script>
</body>

</html>
