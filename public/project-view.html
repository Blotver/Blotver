<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Editor</title>
    <link rel="icon" type="image/png" href="./logo/BlotverFavicon.png">
    <link href="/styles.css" rel="stylesheet">

    <style>
        /* ===== RESIZE HANDLES ===== */

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border: 2px solid #3b82f6;
            border-radius: 2px;
            z-index: 20;
        }

        .resize-handle.corner {
            border-radius: 3px;
        }

        .resize-handle.top {
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            cursor: ns-resize;
        }

        .resize-handle.bottom {
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            cursor: ns-resize;
        }

        .resize-handle.left {
            left: -6px;
            top: 50%;
            transform: translateY(-50%);
            cursor: ew-resize;
        }

        .resize-handle.right {
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            cursor: ew-resize;
        }

        .resize-handle.tl {
            top: -6px;
            left: -6px;
            cursor: nwse-resize;
        }

        .resize-handle.tr {
            top: -6px;
            right: -6px;
            cursor: nesw-resize;
        }

        .resize-handle.bl {
            bottom: -6px;
            left: -6px;
            cursor: nesw-resize;
        }

        .resize-handle.br {
            bottom: -6px;
            right: -6px;
            cursor: nwse-resize;
        }

        .selected-widget {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }

        .layer-item.active {
            background: #1f2937;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ===== SLIDE SIDEBAR SYSTEM ===== */

        #sidePanel {
            overflow: hidden;
            position: relative;
        }

        .sidebar-wrapper {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.35s cubic-bezier(.4, 0, .2, 1);
            min-width: 0;
            /* 🔥 */
        }

        .panel {
            width: 50%;
            padding: 16px;
            overflow-y: auto;
            box-sizing: border-box;
            /* 🔥 CLAVE */
            min-width: 0;
            /* 🔥 evita overflow interno */
        }

        .panel::-webkit-scrollbar {
            display: none;
        }

        .panel {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .show-settings .sidebar-wrapper {
            transform: translateX(-50%);
        }

        .sidebar-header {
            height: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            border-bottom: 1px solid #1f2937;
            cursor: pointer;
            font-size: 14px;
            color: #9ca3af;
            background: #111827;
        }

        .sidebar-header:hover {
            background: #1f2937;
        }

        .sidebar-header svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s ease;
        }

        .show-settings .sidebar-header svg {
            transform: rotate(180deg);
        }

        .widget-option {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid transparent;
            transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
        }

        .widget-option:hover {
            background: rgba(139, 92, 246, 0.06);
            transform: translateX(4px);
        }

        .widget-option:active {
            transform: translateX(4px) scale(0.98);
        }

        .icon-wrap {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .widget-option:hover .icon-wrap {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.25);
        }

        #fabMain.glow {
            box-shadow:
                0 0 0 1px rgba(139, 92, 246, 0.5),
                0 0 25px rgba(139, 92, 246, 0.35),
                0 15px 45px rgba(0, 0, 0, 0.6);
        }

        .fab-item {
            position: relative;
        }

        .fab-item::after {
            content: attr(data-label);
            position: absolute;
            right: 70px;
            /* más separado */
            top: 50%;
            transform: translateY(-50%) translateX(10px);

            background: #0f172a;
            border: 1px solid #1f2937;
            color: white;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 10px;

            opacity: 0;
            transition: all 0.25s cubic-bezier(.4, 0, .2, 1);
            pointer-events: none;
            white-space: nowrap;

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .fab-item:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .icon-tooltip {
            position: relative;
        }

        .icon-tooltip::after {
            content: attr(data-label);
            position: absolute;
            bottom: -36px;
            left: 50%;
            transform: translateX(-50%) translateY(5px);

            background: #0f172a;
            border: 1px solid #1f2937;
            padding: 6px 10px;
            font-size: 11px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .icon-tooltip:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 767px) {

            #mobileNav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 75px;
                background: #0f172a;
                display: flex;
                justify-content: space-around;
                align-items: center;
                z-index: 1200;
                box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.4);

                clip-path: path("M0 0 Q 30% 0 42% 0 Q 50% 0 50% -70 Q 50% 0 58% 0 Q 70% 0 100% 0 L100% 100% L0 100% Z");
            }

            #fabWrapper {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 50;
            }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <script>
        const projectId = window.location.pathname.split("/").pop();

        const overlayURL =
            window.location.origin + "/overlay/" + projectId;

        document.getElementById("copyOverlayBtn")
            .addEventListener("click", async () => {

                await navigator.clipboard.writeText(overlayURL);

                const toast = document.getElementById("copyToast");

                toast.classList.remove("opacity-0", "translate-y-2", "scale-95");
                toast.classList.add("opacity-100", "translate-y-0", "scale-100");

                setTimeout(() => {
                    toast.classList.remove("opacity-100", "translate-y-0", "scale-100");
                    toast.classList.add("opacity-0", "translate-y-2", "scale-95");
                }, 2000);
            });

        function goBack() {

            if (hasUnsavedChanges) {
                const confirmExit = confirm(
                    "¿Estás seguro que quieres salir sin guardar el progreso?"
                );

                if (!confirmExit) return;
            }

            window.location.href = "/dashboard/project";
        }

        let widgets = [];
        let selectedWidget = null;
        let selectedElement = null;
        let currentProject = null;
        let pendingImageFile = null;
        let hasUnsavedChanges = false;

        window.addEventListener("beforeunload", function (e) {

            if (!hasUnsavedChanges) return;

            e.preventDefault();
            e.returnValue = "";
        });

        function openImageModal() {
            document.getElementById("uploadModal").classList.remove("hidden");
        }

        function closeImageModal() {

            const modal = document.getElementById("uploadModal");

            // 🔥 Ocultar modal
            modal.classList.add("hidden");

            // 🔄 Resetear estado
            pendingImageFile = null;

            const previewContainer = document.getElementById("imagePreview");
            const previewImg = previewContainer.querySelector("img");

            previewImg.src = "";
            previewContainer.classList.add("hidden");

            const uploadBtn = document.getElementById("confirmUpload");
            uploadBtn.disabled = true;

            const fileInput = document.getElementById("imageInput");
            fileInput.value = "";
        }

        // cerrar con botón X
        document.getElementById("closeUpload")
            .addEventListener("click", closeImageModal);

        document.getElementById("uploadModal")
            .addEventListener("click", (e) => {

                if (e.target.id === "uploadModal") {
                    closeImageModal();
                }

            });

        // subir imagen
        document.getElementById("imageInput")
            .addEventListener("change", (e) => {

                const file = e.target.files[0];
                if (!file) return;

                pendingImageFile = file;

                // Mostrar preview
                const previewContainer = document.getElementById("imagePreview");
                const previewImg = previewContainer.querySelector("img");

                previewImg.src = URL.createObjectURL(file);
                previewContainer.classList.remove("hidden");

                // Activar botón Upload
                document.getElementById("confirmUpload").disabled = false;
            });

        document.getElementById("confirmUpload")
            .addEventListener("click", async () => {

                if (!pendingImageFile || !selectedWidget) return;

                const formData = new FormData();
                formData.append("image", pendingImageFile);

                const res = await fetch("/api/upload-image", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (data.url) {

                    const img = new Image();

                    img.onload = async function () {

                        const canvas = document.getElementById("canvas");

                        const canvasWidth = canvas.clientWidth;
                        const canvasHeight = canvas.clientHeight;

                        const maxWidth = canvasWidth * 0.4;
                        const maxHeight = canvasHeight * 0.4;

                        let newWidth = img.width;
                        let newHeight = img.height;

                        const ratio = Math.min(
                            maxWidth / newWidth,
                            maxHeight / newHeight,
                            1
                        );

                        newWidth = newWidth * ratio;
                        newHeight = newHeight * ratio;

                        const centerX = (canvasWidth - newWidth) / 2;
                        const centerY = (canvasHeight - newHeight) / 2;

                        updateSelectedWidget({
                            url: data.url,
                            width: Math.round(newWidth),
                            height: Math.round(newHeight),
                            x: Math.round(centerX),
                            y: Math.round(centerY)
                        });

                        closeImageModal();
                    };

                    img.src = data.url;

                    // Reset modal
                    pendingImageFile = null;
                    document.getElementById("confirmUpload").disabled = true;
                    document.getElementById("imagePreview").classList.add("hidden");
                }
            });

        /* ================= LOAD ================= */

        async function loadWidgets() {
            const projectRes = await fetch("/api/projects");
            const allProjects = await projectRes.json();
            currentProject = allProjects.find(p => p._id === projectId);
            if (currentProject) {
                document.getElementById("projectNameInput").value =
                    currentProject.name || currentProject.title || "";
            }
            const res = await fetch(`/api/widgets/${projectId}`);
            widgets = await res.json();

            // 🚀 Si es proyecto shoutout y no tiene widgets → crear uno automático
            if (currentProject?.type && widgets.length === 0) {

                const widgetType = currentProject.type;
                const widgetDef = window.WidgetRegistry[widgetType];

                if (widgetDef?.defaultData) {

                    await fetch("/api/widgets", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            projectId,
                            type: widgetType,
                            name: widgetType,
                            data: widgetDef.defaultData
                        })
                    });

                    const newRes = await fetch(`/api/widgets/${projectId}`);
                    widgets = await newRes.json();
                }
            }

            const canvas = document.getElementById("canvas");
            const layersPanel = document.getElementById("layersPanel");

            canvas.innerHTML = "";
            layersPanel.innerHTML = "";

            widgets = widgets.map(w => ({
                ...w,
                data: w.data || {}
            }));

            widgets.sort((a, b) =>
                (a.data?.zIndex ?? 0) - (b.data?.zIndex ?? 0)
            );
            const reversedWidgets = [...widgets].reverse();

            widgets.forEach(widget => {

                const el = document.createElement("div");
                el.dataset.widgetId = widget._id;

                if (widget.type === "text") {
                    el.innerText = widget.data.text || "Sample Text";
                }

                const widgetDef = window.WidgetRegistry[widget.type];

                if (widgetDef && widgetDef.renderCanvas) {
                    const rendered = widgetDef.renderCanvas(widget);
                    el.appendChild(rendered);
                }

                el.className = "absolute cursor-move select-none";
                el.style.left = (widget.data.x || 100) + "px";
                el.style.top = (widget.data.y || 100) + "px";
                el.style.color = widget.data.color ?? "#000";
                el.style.fontSize = (widget.data.fontSize || 32) + "px";
                el.style.zIndex = widget.data.zIndex ?? widgets.indexOf(widget);
                el.classList.add("draggable-resizable");

                if (widget.data.width) {
                    el.style.width = widget.data.width + "px";
                }

                if (widget.data.height) {
                    el.style.height = widget.data.height + "px";
                }

                if (widget.data.visible === false) {
                    el.style.display = "none";
                }

                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectWidget(widget, el);
                });

                canvas.appendChild(el);

                interact(el)
                    .draggable({
                        listeners: {
                            move(event) {

                                const target = event.target;

                                const left = parseFloat(target.style.left) || 0;
                                const top = parseFloat(target.style.top) || 0;

                                target.style.left = left + event.dx + "px";
                                target.style.top = top + event.dy + "px";
                            },
                            end(event) {

                                const target = event.target;
                                const widgetId = target.dataset.widgetId;

                                const widget = widgets.find(w => w._id === widgetId);
                                if (!widget) return;

                                const left = parseFloat(target.style.left) || 0;
                                const top = parseFloat(target.style.top) || 0;

                                widget.data.x = left;
                                widget.data.y = top;

                                if (selectedWidget && selectedWidget._id === widgetId) {
                                    selectedWidget.data.x = left;
                                    selectedWidget.data.y = top;
                                }

                                markAsChanged();
                            }
                        }
                    })

                    .resizable({
                        edges: {
                            top: ".resize-handle.top, .resize-handle.tl, .resize-handle.tr",
                            bottom: ".resize-handle.bottom, .resize-handle.bl, .resize-handle.br",
                            left: ".resize-handle.left, .resize-handle.tl, .resize-handle.bl",
                            right: ".resize-handle.right, .resize-handle.tr, .resize-handle.br"
                        },
                        listeners: {

                            move(event) {

                                const target = event.target;
                                const widgetId = target.dataset.widgetId;
                                const widget = widgets.find(w => w._id === widgetId);
                                if (!widget) return;

                                let left = parseFloat(target.style.left) || 0;
                                let top = parseFloat(target.style.top) || 0;

                                const oldWidth = parseFloat(target.style.width) || 0;
                                const oldHeight = parseFloat(target.style.height) || 0;

                                let width = event.rect.width;
                                let height = event.rect.height;

                                const resizingFromLeft = event.edges.left;
                                const resizingFromTop = event.edges.top;

                                // ===== 🔒 LOCK RATIO =====
                                const lock = widget.data.lockRatio;
                                const ratio = widget.data.aspectRatio;

                                if (lock && ratio) {

                                    if (event.edges.left || event.edges.right) {
                                        height = width / ratio;
                                    }
                                    else if (event.edges.top || event.edges.bottom) {
                                        width = height * ratio;
                                    }
                                }

                                // ===== Ajuste posición correcto =====
                                if (resizingFromLeft) {
                                    left += oldWidth - width;
                                }

                                if (resizingFromTop) {
                                    top += oldHeight - height;
                                }

                                target.style.left = left + "px";
                                target.style.top = top + "px";
                                target.style.width = width + "px";
                                target.style.height = height + "px";
                            },

                            end(event) {

                                const target = event.target;
                                const widgetId = target.dataset.widgetId;

                                const widget = widgets.find(w => w._id === widgetId);
                                if (!widget) return;

                                const left = parseFloat(target.style.left) || 0;
                                const top = parseFloat(target.style.top) || 0;
                                const width = parseFloat(target.style.width);
                                const height = parseFloat(target.style.height);

                                widget.data = {
                                    ...widget.data,
                                    x: left,
                                    y: top,
                                    width,
                                    height
                                };

                                if (selectedWidget && selectedWidget._id === widgetId) {
                                    selectedWidget.data = widget.data;
                                }

                                markAsChanged();
                            }
                        }
                    })

                if (widgets.length === 1) {
                    selectWidget(widget, el);
                }

                const layerItem = document.createElement("div");

                layerItem.className = ` flex items-center justify-between px-3 py-2 rounded-lg bg-gray-800/60 hover:bg-gray-700/70 border border-transparent hover:border-gray-700 cursor-pointer text-sm transition-all `;

                layerItem.dataset.id = widget._id;

                layerItem.draggable = true;

                layerItem.addEventListener("dragstart", (e) => {
                    e.dataTransfer.setData("id", widget._id);
                });

                layerItem.addEventListener("dragover", (e) => {
                    e.preventDefault();
                });

                layerItem.addEventListener("drop", async (e) => {
                    e.preventDefault();

                    const draggedId = e.dataTransfer.getData("id");
                    const targetId = widget._id;

                    if (draggedId === targetId) return;

                    const fromIndex = widgets.findIndex(w => w._id === draggedId);
                    const toIndex = widgets.findIndex(w => w._id === targetId);

                    const moved = widgets.splice(fromIndex, 1)[0];
                    widgets.splice(toIndex, 0, moved);

                    await updateLayerOrder();

                    loadWidgets();
                });

                layerItem.innerHTML = `
<div class="flex items-center gap-2 truncate">
    
    <button 
        class="visibility-btn w-7 h-7 flex items-center justify-center rounded-md bg-gray-800/60 hover:bg-gray-700/80 border border-transparent hover:border-gray-600 transition group">
        ${widget.data.visible === false
                        ? `
            <!-- Eye Off -->
            <svg xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4 text-gray-500 group-hover:text-gray-300 transition"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 3l18 18M10.73 5.08A10.94 10.94 0 0112 5c5 0 9 7 9 7a16.88 16.88 0 01-2.68 3.64M6.53 6.53A16.88 16.88 0 003 12s4 7 9 7a10.94 10.94 0 005.27-1.42"/>
            </svg>
            `
                        : `
            <!-- Eye -->
            <svg xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4 text-gray-400 group-hover:text-white transition"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            `
                    }
    </button>

    <input 
        class="bg-transparent text-gray-300 focus:text-white outline-none w-full truncate text-sm border-b border-transparent focus:border-purple-500 transition"
        value="${widget.name || widget.type}"
        data-id="${widget._id}"
    />
</div>

<button class="delete-btn w-6 h-6 flex items-center justify-center rounded hover:bg-red-500/20 transition group">

<svg xmlns="http://www.w3.org/2000/svg"
class="w-3.5 h-3.5 text-gray-400 group-hover:text-red-400 transition"
fill="none" viewBox="0 0 24 24"
stroke="currentColor" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round"
d="M6 7h12M9 7v12m6-12v12M10 3h4a1 1 0 011 1v2H9V4a1 1 0 011-1z" />
</svg>

</button>
`;

                layerItem.querySelector(".visibility-btn")
                    .addEventListener("click", async (e) => {
                        e.stopPropagation();

                        const newVisibility = widget.data.visible === false ? true : false;

                        await fetch(`/api/widgets/${widget._id}`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                data: {
                                    ...widget.data,
                                    visible: newVisibility
                                }
                            })
                        });

                        loadWidgets();
                    });

                layerItem.addEventListener("click", (e) => {
                    if (
                        e.target.closest(".visibility-btn") ||
                        e.target.closest(".delete-btn") ||
                        e.target.tagName === "INPUT"
                    ) return;

                    selectWidget(widget, el);
                });

                layerItem.querySelector(".delete-btn").addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectedWidget = widget;
                    deleteSelectedWidget();
                });

                layersPanel.appendChild(layerItem);

                layerItem.querySelector("input")
                    .addEventListener("input", (e) => {

                        e.stopPropagation();

                        widget.name = e.target.value;

                        if (selectedWidget && selectedWidget._id === widget._id) {
                            document.getElementById("settingsTitle").innerText =
                                widget.name || widget.type;
                        }

                        markAsChanged();
                    });

            });

            resetChanges();

        }


        document.getElementById("saveBtn").addEventListener("click", saveConfig);

        async function saveConfig() {
            if (!currentProject) return;

            const projectTitle =
                document.getElementById("projectNameInput").value;

            showSaveToast("Saving", "loading");

            try {

                await fetch(`/api/projects/${currentProject._id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: projectTitle })
                });

                for (let widget of widgets) {

                    await fetch(`/api/widgets/${widget._id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            name: widget.name,
                            data: widget.data   // 🔥 IMPORTANTE
                        })
                    });
                }

                showSaveToast("Saved", "success");
                resetChanges();
                loadWidgets();

            } catch (error) {
                console.error(error);
                showSaveToast("Error saving", "error");
            }

        }

        function markAsChanged() {
            if (hasUnsavedChanges) return;

            hasUnsavedChanges = true;

            ["saveBtn", "mobileSaveBtn", "saveIconBtn"].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.disabled = false;
                btn.classList.remove("opacity-50", "cursor-not-allowed");
            });
        }

        function resetChanges() {
            hasUnsavedChanges = false;

            ["saveBtn", "mobileSaveBtn", "saveIconBtn"].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.disabled = true;
                btn.classList.add("opacity-50", "cursor-not-allowed");
            });
        }

        document.getElementById("projectNameInput")
            .addEventListener("input", markAsChanged);

        /* ================= SELECT ================= */
        function showSaveToast(message, type = "success") {

            const toast = document.getElementById("saveToast");
            const text = document.getElementById("saveToastText");
            const icon = document.getElementById("saveToastIcon");

            text.innerText = message;

            // Reset icon color
            icon.classList.remove("text-emerald-400", "text-red-400", "text-gray-400");

            if (type === "success") {
                icon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M5 13l4 4L19 7" />
        `;
                icon.classList.add("text-emerald-400");
            }

            if (type === "loading") {
                icon.innerHTML = `
            <circle cx="12" cy="12" r="10" stroke="currentColor"
                stroke-width="2" fill="none" stroke-dasharray="60"
                stroke-dashoffset="20">
                <animateTransform attributeName="transform"
                    type="rotate"
                    from="0 12 12"
                    to="360 12 12"
                    dur="1s"
                    repeatCount="indefinite"/>
            </circle>
        `;
                icon.classList.add("text-gray-400");
            }

            if (type === "error") {
                icon.innerHTML = `
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M6 18L18 6M6 6l12 12" />
        `;
                icon.classList.add("text-red-400");
            }

            toast.classList.remove("opacity-0", "translate-y-3", "scale-95");
            toast.classList.add("opacity-100", "translate-y-0", "scale-100");

            if (type !== "loading") {
                setTimeout(() => {
                    toast.classList.remove("opacity-100", "translate-y-0", "scale-100");
                    toast.classList.add("opacity-0", "translate-y-3", "scale-95");
                }, 2200);
            }
        }

        function selectWidget(widget, element) {

            if (selectedElement) {
                selectedElement.style.border = "none";
                selectedElement.querySelectorAll(".resize-handle")
                    .forEach(h => h.remove());
            }

            selectedWidget = widget;
            selectedElement = element;

            element.style.border = "2px solid #3b82f6";
            element.style.boxSizing = "border-box";

            openConfig(widget);
            addResizeHandles(element);

        }

        function addResizeHandles(el) {

            el.querySelectorAll(".resize-handle").forEach(h => h.remove());

            const positions = [
                "top", "bottom", "left", "right",
                "tl", "tr", "bl", "br"
            ];

            positions.forEach(pos => {
                const handle = document.createElement("div");
                handle.className = "resize-handle " + pos;
                el.appendChild(handle);
            });
        }

        function showLayers() {

            if (selectedElement) {
                selectedElement.style.border = "none";
                selectedElement.querySelectorAll(".resize-handle")
                    .forEach(h => h.remove());
            }

            selectedWidget = null;
            selectedElement = null;
        }

        function openConfig(widget) {

            selectedWidget = widget;

            document.getElementById("settingsOverlay").classList.remove("hidden");
            document.getElementById("settingsTitle").innerText =
                widget.name || widget.type;

            updateActiveLayer(widget._id);

            const content = document.getElementById("configContent");
            content.innerHTML = ""; // 🔥 LIMPIAR ANTES

            const widgetDef = window.WidgetRegistry[widget.type];

            if (widgetDef && widgetDef.renderConfig) {
                widgetDef.renderConfig(widget, content, updateSelectedWidget);

            }
        }

        function updateSelectedWidget(updates) {

            if (!selectedWidget || !selectedElement) return;

            // ===== 1️⃣ Actualizar memoria =====
            selectedWidget.data = {
                ...selectedWidget.data,
                ...updates
            };

            const index = widgets.findIndex(w => w._id === selectedWidget._id);
            if (index !== -1) {
                widgets[index].data = selectedWidget.data;
            }

            // ===== 2️⃣ Actualizar posición y tamaño =====
            if (updates.x !== undefined)
                selectedElement.style.left = updates.x + "px";

            if (updates.y !== undefined)
                selectedElement.style.top = updates.y + "px";

            if (updates.width !== undefined)
                selectedElement.style.width = updates.width + "px";

            if (updates.height !== undefined)
                selectedElement.style.height = updates.height + "px";

            // ===== 3️⃣ 🔥 RE-RENDER DEL WIDGET (CLAVE) =====
            const widgetDef = window.WidgetRegistry[selectedWidget.type];

            if (widgetDef && widgetDef.renderCanvas) {
                selectedElement.innerHTML = "";
                const rendered = widgetDef.renderCanvas(selectedWidget);
                selectedElement.appendChild(rendered);
            }

            // ===== 4️⃣ Sincronizar panel =====
            const panel = document.getElementById("configContent");
            if (!panel) return;

            panel.querySelectorAll("input[data-field]").forEach(input => {
                const field = input.dataset.field;
                if (selectedWidget.data[field] !== undefined) {
                    input.value = selectedWidget.data[field];
                }
            });

            panel.querySelectorAll("input[type='range']").forEach(range => {
                const span = range.parentElement.querySelector("span");
                if (span && range.dataset.field) {
                    span.innerText = selectedWidget.data[range.dataset.field];
                }
            });

            panel.querySelectorAll("[data-fit]").forEach(btn => {
                const active = btn.dataset.fit === selectedWidget.data.objectFit;
                btn.className =
                    "flex-1 py-2 rounded-md border text-xs capitalize " +
                    (active
                        ? "bg-gray-700 border-gray-600 text-white"
                        : "bg-gray-900 border-gray-700 text-gray-400 hover:text-white");
            });


            const lockBtn = panel.querySelector("#lockRatio");
            if (lockBtn) {
                lockBtn.className =
                    "flex items-center justify-center w-10 h-10 transition-colors duration-150 rounded-md border " +
                    (selectedWidget.data.lockRatio
                        ? "bg-gray-600 border-gray-500 text-white"
                        : "bg-gray-900 border-gray-700 text-gray-400 hover:text-white");
            }

            // ===== 5️⃣ Marcar cambios =====
            markAsChanged();
        }

        function closeSettings() {
            document.getElementById("settingsOverlay").classList.add("hidden");

            document.querySelectorAll("#layersPanel > div")
                .forEach(i => i.classList.remove("ring-2", "ring-purple-500"));
        }

        async function deleteSelectedWidget() {
            if (!selectedWidget) return;

            await fetch(`/api/widgets/${selectedWidget._id}`, {
                method: "DELETE"
            });

            selectedWidget = null;
            selectedElement = null;

            document.getElementById("settingsOverlay").classList.add("hidden");

            loadWidgets();
        }
        /* ================= UPDATE ================= */

        async function updateLayerOrder() {
            for (let i = 0; i < widgets.length; i++) {
                await fetch(`/api/widgets/${widgets[i]._id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        data: {
                            ...widgets[i].data,
                            zIndex: i
                        }
                    })
                });
            }
        }

        function updateActiveLayer(id) {
            document.querySelectorAll("#layersPanel > div").forEach(item => {
                item.classList.remove("ring-2", "ring-purple-500", "bg-gray-700/80");
            });

            const active = document.querySelector(`#layersPanel > div[data-id="${id}"]`);
            if (active) {
                active.classList.add("ring-2", "ring-purple-500", "bg-gray-700/80");
            }
        }
        /* ================= DRAG ================= */

        async function createWidget(type) {

            const widgetDef = window.WidgetRegistry[type];

            const defaultData = widgetDef?.defaultData || {
                x: 100,
                y: 100,
                visible: true,
                zIndex: widgets.length
            };

            await fetch("/api/widgets", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    projectId,
                    type,
                    name: type,
                    data: defaultData
                })
            });

            loadWidgets();
        }

        loadWidgets();

        const fabMain = document.getElementById("fabMain");
        const items = document.querySelectorAll(".fab-item");
        const fabWrapper = document.getElementById("fabWrapper");
        let isOpen = false;

        const fabStack = document.getElementById("fabStack");

        fabMain.addEventListener("click", (e) => {
            e.stopPropagation();
            isOpen = !isOpen;

            if (isOpen) {
                fabStack.classList.remove("pointer-events-none");
                fabMain.classList.add("glow");
            } else {
                fabStack.classList.add("pointer-events-none");
                fabMain.classList.remove("glow");
            }

            items.forEach((item, index) => {
                const reversedIndex = items.length - 1 - index;

                if (isOpen) {
                    item.style.transitionDelay = `${index * 55}ms`;
                    item.classList.remove("opacity-0", "translate-y-6", "scale-90");
                } else {
                    item.style.transitionDelay = "0ms";
                    item.classList.add("opacity-0", "translate-y-6", "scale-90");
                }
            });
        });

        document.addEventListener("click", (e) => {
            if (!fabWrapper.contains(e.target) && isOpen) {

                isOpen = false;

                fabStack.classList.add("pointer-events-none");
                fabMain.classList.remove("glow");

                items.forEach(item => {
                    item.style.transitionDelay = "0ms";
                    item.classList.add("opacity-0", "translate-y-6", "scale-90");
                });
            }
        });

        document.getElementById("fabImage")
            .addEventListener("click", () => createWidget("image"));

        document.getElementById("fabText")
            .addEventListener("click", () => createWidget("text"));

        document.getElementById("fabTest")
            .addEventListener("click", () => {
                console.log("Test action");
            });


        document.getElementById("saveIconBtn")
            .addEventListener("click", saveConfig);

        document.getElementById("mobileSaveBtn")
            .addEventListener("click", saveConfig);

        // ===== MOBILE CANVAS SCALE =====
        function applyMobileScale() {
            const canvas = document.getElementById("canvas");
            if (!canvas) return;

            const baseWidth = 1280;
            const screenWidth = window.innerWidth;

            if (screenWidth < 768) {
                const scale = screenWidth / baseWidth;
                canvas.style.transform = `scale(${scale})`;
                canvas.style.transformOrigin = "top left";
            } else {
                canvas.style.transform = "scale(1)";
            }
        }

        window.addEventListener("resize", applyMobileScale);
        window.addEventListener("load", applyMobileScale);

        const layersSheet = document.getElementById("layersSheet");
        const openLayersBtn = document.getElementById("openLayersBtn");
        const closeLayersSheet = document.getElementById("closeLayersSheet");

        openLayersBtn.addEventListener("click", () => {
            layersSheet.classList.remove("translate-y-full");
            document.body.classList.add("overflow-hidden");
        });

        closeLayersSheet.addEventListener("click", () => {
            layersSheet.classList.add("translate-y-full");
            document.body.classList.remove("overflow-hidden");
        });
    </script>
</body>

</html>
