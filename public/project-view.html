<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Project Editor</title>
    <link href="/styles.css" rel="stylesheet">

    <style>
        .selected-widget {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }

        .layer-item.active {
            background: #1f2937;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ===== SLIDE SIDEBAR SYSTEM ===== */

        #sidePanel {
            overflow: hidden;
            position: relative;
        }

        .sidebar-wrapper {
            display: flex;
            width: 200%;
            height: 100%;
            transition: transform 0.35s cubic-bezier(.4, 0, .2, 1);
        }

        .panel {
            width: 50%;
            padding: 16px;
            overflow-y: auto;
        }

        .panel::-webkit-scrollbar {
            display: none;
        }

        .panel {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .show-settings .sidebar-wrapper {
            transform: translateX(-50%);
        }

        .sidebar-header {
            height: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            border-bottom: 1px solid #1f2937;
            cursor: pointer;
            font-size: 14px;
            color: #9ca3af;
            background: #111827;
        }

        .sidebar-header:hover {
            background: #1f2937;
        }

        .sidebar-header svg {
            width: 16px;
            height: 16px;
            transition: transform 0.2s ease;
        }

        .show-settings .sidebar-header svg {
            transform: rotate(180deg);
        }
    </style>
</head>

<body class="bg-gray-950 text-white overflow-hidden">

    <!-- ================= HEADER ================= -->
    <header
        class="fixed top-0 left-0 w-full h-16 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-6 z-50">

        <div class="flex items-center gap-4">

            <button onclick="goBack()"
                class="text-gray-400 hover:text-white w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-800 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <input id="projectNameInput"
                class="bg-transparent border-b border-gray-600 focus:border-purple-500 outline-none text-lg w-64"
                placeholder="Untitled Overlay">

            <div>
                <span class="text-xs text-gray-400 block">Overlay URL</span>
                <input id="overlayLink" class="bg-gray-800 text-xs px-3 py-1 rounded w-[380px]" readonly>
            </div>
        </div>

        <button id="saveBtn" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded">
            Save
        </button>
    </header>

    <!-- ================= MAIN ================= -->
    <div class="pt-16 h-screen flex">

        <!-- SIDEBAR -->
        <aside class="w-72 bg-gradient-to-b from-gray-950 to-gray-900 border-r border-gray-800 flex flex-col relative">

            <!-- HEADER -->
            <div class="h-14 flex items-center px-4 border-b border-gray-800">
                <h2 class="text-sm font-semibold tracking-wide text-gray-300 uppercase">
                    Layers
                </h2>
            </div>

            <!-- LAYERS LIST -->
            <div id="layersPanel" class="flex-1 overflow-y-auto no-scrollbar p-3 space-y-2"></div>

            <!-- SETTINGS OVERLAY -->
            <div id="settingsOverlay" class="absolute inset-0 bg-gray-950/95 backdrop-blur-sm hidden flex flex-col">

                <!-- SETTINGS HEADER -->
                <div class="h-14 flex items-center justify-between px-4 border-b border-gray-800">
                    <div class="flex items-center gap-2">
                        <button onclick="closeSettings()"
                            class="w-8 h-8 flex items-center justify-center rounded hover:bg-gray-800 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                            </svg>
                        </button>
                        <span id="settingsTitle" class="text-sm font-medium text-gray-200">
                            Widget Settings
                        </span>
                    </div>

                    <!-- DELETE BUTTON -->
                    <button class="delete-btn absolute right-2 opacity-0 group-hover:opacity-100 transition"
                        onclick="deleteWidget('ID_DEL_WIDGET')">

                        <!-- SVG Trash -->
                        <svg xmlns="http://www.w3.org/2000/svg"
                            class="w-4 h-4 text-red-400 hover:text-red-500 transition" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19 7l-1 14H6L5 7m5-4h4m-6 4h8" />
                        </svg>

                    </button>
                </div>

                <!-- SETTINGS CONTENT -->
                <div id="configContent" class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4">
                </div>

            </div>

        </aside>

        <!-- CANVAS -->
        <main class="flex-1 relative bg-white overflow-hidden"
            style="background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px;">

            <div id="canvas" class="w-full h-full relative"></div>

            <button id="newWidgetBtn"
                class="fixed bottom-8 left-1/2 -translate-x-1/2 w-16 h-16 bg-purple-600 hover:bg-purple-700 rounded-full shadow-2xl flex items-center justify-center z-40">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            </button>

            <div id="widgetSelector"
                class="hidden fixed bottom-28 left-1/2 -translate-x-1/2 bg-gray-900 border border-gray-700 rounded-xl shadow-xl p-4 flex flex-col gap-2 w-56 z-40">
                <div onclick="createWidget('text')" class="p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">
                    Text</div>
                <div onclick="createWidget('image')" class="p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">
                    Image</div>
        </main>
    </div>

    <div id="uploadModal"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 hidden">

        <div class="bg-gradient-to-br from-[#0f172a] to-[#111827] 
              border border-gray-700
              w-[420px] rounded-2xl shadow-2xl p-6 relative animate-fadeIn">

            <!-- Close -->
            <button id="closeUpload" class="absolute top-4 right-4 text-gray-400 hover:text-white transition">
                ✕
            </button>

            <h2 class="text-lg font-semibold text-white mb-4">
                Upload Image
            </h2>

            <!-- Dropzone -->
            <label id="dropzone" class="flex flex-col items-center justify-center
               border-2 border-dashed border-gray-600
               rounded-xl p-8 cursor-pointer
               hover:border-violet-500 hover:bg-violet-500/10
               transition-all duration-300">

                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-gray-400 mb-3" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M3 16.5V18a3 3 0 003 3h12a3 3 0 003-3v-1.5M12 3v12m0 0l-3-3m3 3l3-3" />
                </svg>

                <span class="text-gray-300 text-sm">
                    Click or drag image to upload
                </span>

                <input type="file" id="imageInput" class="hidden" accept="image/*">
            </label>

            <!-- Preview -->
            <div id="imagePreview" class="mt-4 hidden">
                <img class="rounded-lg max-h-40 mx-auto shadow-lg" />
            </div>

            <!-- Upload button -->
            <button id="confirmUpload" class="w-full mt-5 bg-violet-600 hover:bg-violet-700
               text-white py-2 rounded-lg transition disabled:opacity-40" disabled>
                Upload
            </button>

        </div>
    </div>

    <div id="saveToast" class="fixed bottom-6 right-6
           bg-gray-800/90 backdrop-blur-xl
           text-gray-100
           px-5 py-2.5
           rounded-lg
           shadow-lg shadow-black/40
           text-sm font-medium
           opacity-0 pointer-events-none
           transition-all duration-300
           translate-y-3 scale-95">
        Saved
    </div>

    <script src="/widgets/registry.js"></script>
    <script src="/widgets/shoutout.js"></script>
    <script src="/widgets/image.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <script>
        const projectId = window.location.pathname.split("/").pop();
        document.getElementById("overlayLink").value =
            window.location.origin + "/overlay/" + projectId;

        function goBack() {

            if (hasUnsavedChanges) {
                const confirmExit = confirm(
                    "¿Estás seguro que quieres salir sin guardar el progreso?"
                );

                if (!confirmExit) return;
            }

            window.location.href = "/dashboard/project";
        }

        let widgets = [];
        let selectedWidget = null;
        let selectedElement = null;
        let currentProject = null;
        let pendingImageFile = null;
        let hasUnsavedChanges = false;

        window.addEventListener("beforeunload", function (e) {

            if (!hasUnsavedChanges) return;

            e.preventDefault();
            e.returnValue = "";
        });

        function openImageModal() {
            document.getElementById("uploadModal").classList.remove("hidden");
        }

        function closeImageModal() {

            const modal = document.getElementById("uploadModal");

            // 🔥 Ocultar modal
            modal.classList.add("hidden");

            // 🔄 Resetear estado
            pendingImageFile = null;

            const previewContainer = document.getElementById("imagePreview");
            const previewImg = previewContainer.querySelector("img");

            previewImg.src = "";
            previewContainer.classList.add("hidden");

            const uploadBtn = document.getElementById("confirmUpload");
            uploadBtn.disabled = true;

            const fileInput = document.getElementById("imageInput");
            fileInput.value = "";
        }

        // cerrar con botón X
        document.getElementById("closeUpload")
            .addEventListener("click", closeImageModal);

        document.getElementById("uploadModal")
            .addEventListener("click", (e) => {

                if (e.target.id === "uploadModal") {
                    closeImageModal();
                }

            });

        // subir imagen
        document.getElementById("imageInput")
            .addEventListener("change", (e) => {

                const file = e.target.files[0];
                if (!file) return;

                pendingImageFile = file;

                // Mostrar preview
                const previewContainer = document.getElementById("imagePreview");
                const previewImg = previewContainer.querySelector("img");

                previewImg.src = URL.createObjectURL(file);
                previewContainer.classList.remove("hidden");

                // Activar botón Upload
                document.getElementById("confirmUpload").disabled = false;
            });

        document.getElementById("confirmUpload")
            .addEventListener("click", async () => {

                if (!pendingImageFile || !selectedWidget) return;

                const formData = new FormData();
                formData.append("image", pendingImageFile);

                const res = await fetch("/api/upload-image", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (data.url) {

                    const img = new Image();

                    img.onload = async function () {

                        const canvas = document.getElementById("canvas");

                        const canvasWidth = canvas.clientWidth;
                        const canvasHeight = canvas.clientHeight;

                        const maxWidth = canvasWidth * 0.4;
                        const maxHeight = canvasHeight * 0.4;

                        let newWidth = img.width;
                        let newHeight = img.height;

                        const ratio = Math.min(
                            maxWidth / newWidth,
                            maxHeight / newHeight,
                            1
                        );

                        newWidth = newWidth * ratio;
                        newHeight = newHeight * ratio;

                        const centerX = (canvasWidth - newWidth) / 2;
                        const centerY = (canvasHeight - newHeight) / 2;

                        updateSelectedWidget({
                            url: data.url,
                            width: Math.round(newWidth),
                            height: Math.round(newHeight),
                            x: Math.round(centerX),
                            y: Math.round(centerY)
                        });

                        // 🔥 actualizar solo el elemento visual actual
                        selectedElement.querySelector("img").src = data.url;

                        closeImageModal();
                    };

                    img.src = data.url;

                    // Reset modal
                    pendingImageFile = null;
                    document.getElementById("confirmUpload").disabled = true;
                    document.getElementById("imagePreview").classList.add("hidden");
                }
            });

        /* ================= LOAD ================= */

        async function loadWidgets() {
            const projectRes = await fetch("/api/projects");
            const allProjects = await projectRes.json();
            currentProject = allProjects.find(p => p._id === projectId);
            if (currentProject) {
                document.getElementById("projectNameInput").value =
                    currentProject.name || currentProject.title || "";
            }
            const res = await fetch(`/api/widgets/${projectId}`);
            widgets = await res.json();

            // 🚀 Si es proyecto shoutout y no tiene widgets → crear uno automático
            if (currentProject?.type && widgets.length === 0) {

                const widgetType = currentProject.type;
                const widgetDef = window.WidgetRegistry[widgetType];

                if (widgetDef?.defaultData) {

                    await fetch("/api/widgets", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            projectId,
                            type: widgetType,
                            name: widgetType,
                            data: widgetDef.defaultData
                        })
                    });

                    const newRes = await fetch(`/api/widgets/${projectId}`);
                    widgets = await newRes.json();
                }
            }

            const canvas = document.getElementById("canvas");
            const layersPanel = document.getElementById("layersPanel");

            canvas.innerHTML = "";
            layersPanel.innerHTML = "";

            widgets = widgets.map(w => ({
                ...w,
                data: w.data || {}
            }));

            widgets.sort((a, b) =>
                (a.data?.zIndex ?? 0) - (b.data?.zIndex ?? 0)
            );
            const reversedWidgets = [...widgets].reverse();

            widgets.forEach(widget => {

                const el = document.createElement("div");

                if (widget.type === "text") {
                    el.innerText = widget.data.text || "Sample Text";
                }

                const widgetDef = window.WidgetRegistry[widget.type];

                if (widgetDef && widgetDef.renderCanvas) {
                    const rendered = widgetDef.renderCanvas(widget);
                    el.appendChild(rendered);
                }

                el.className = "absolute cursor-move select-none";
                el.style.left = (widget.data.x || 100) + "px";
                el.style.top = (widget.data.y || 100) + "px";
                el.style.color = widget.data.color ?? "#000";
                el.style.fontSize = (widget.data.fontSize || 32) + "px";
                el.style.zIndex = widget.data.zIndex ?? widgets.indexOf(widget);
                el.classList.add("draggable-resizable");

                if (widget.data.width) {
                    el.style.width = widget.data.width + "px";
                }

                if (widget.data.height) {
                    el.style.height = widget.data.height + "px";
                }

                if (widget.data.visible === false) {
                    el.style.display = "none";
                }

                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectWidget(widget, el);
                });

                canvas.appendChild(el);

                interact(el)
                    .draggable({
                        listeners: {
                            move(event) {

                                const target = event.target;

                                const left = parseFloat(target.style.left) || 0;
                                const top = parseFloat(target.style.top) || 0;

                                target.style.left = left + event.dx + "px";
                                target.style.top = top + event.dy + "px";
                            },
                            end(event) {

                                const target = event.target;

                                const left = parseFloat(target.style.left) || 0;
                                const top = parseFloat(target.style.top) || 0;

                                updateSelectedWidget({
                                    x: left,
                                    y: top
                                });
                            }
                        }
                    })

                    .resizable({
                        edges: { left: true, right: true, bottom: true, top: true },

                        listeners: {

                            move(event) {

                                const target = event.target;
                                const canvas = document.getElementById("canvas");

                                let width = event.rect.width;
                                let height = event.rect.height;

                                let left = parseFloat(target.style.left) || 0;
                                let top = parseFloat(target.style.top) || 0;

                                // 🔒 lock ratio
                                if (selectedWidget?.data?.lockRatio && selectedWidget?.data?.aspectRatio) {

                                    const ratio = selectedWidget.data.aspectRatio;

                                    if (width / height > ratio) {
                                        width = height * ratio;
                                    } else {
                                        height = width / ratio;
                                    }
                                }

                                if (event.edges.left) {
                                    left = event.rect.right - width;
                                }

                                if (event.edges.top) {
                                    top = event.rect.bottom - height;
                                }

                                // límites reales sin romper interact
                                if (left < 0) {
                                    width += left;
                                    left = 0;
                                }

                                if (top < 0) {
                                    height += top;
                                    top = 0;
                                }

                                const maxWidth = canvas.clientWidth - left;
                                const maxHeight = canvas.clientHeight - top;

                                if (width > maxWidth) width = maxWidth;
                                if (height > maxHeight) height = maxHeight;

                                target.style.width = width + "px";
                                target.style.height = height + "px";
                                target.style.left = left + "px";
                                target.style.top = top + "px";
                            },

                            end(event) {

                                const target = event.target;

                                updateSelectedWidget({
                                    x: parseFloat(target.style.left) || 0,
                                    y: parseFloat(target.style.top) || 0,
                                    width: parseFloat(target.style.width),
                                    height: parseFloat(target.style.height)
                                });
                            }
                        }
                    })

                if (widgets.length === 1) {
                    selectWidget(widget, el);
                }

                const layerItem = document.createElement("div");

                layerItem.className = `
flex items-center justify-between px-3 py-2 rounded-lg
bg-gray-800/60 hover:bg-gray-700/70
border border-transparent hover:border-gray-700
cursor-pointer text-sm transition-all
`;

                layerItem.dataset.id = widget._id;

                layerItem.draggable = true;

                layerItem.addEventListener("dragstart", (e) => {
                    e.dataTransfer.setData("id", widget._id);
                });

                layerItem.addEventListener("dragover", (e) => {
                    e.preventDefault();
                });

                layerItem.addEventListener("drop", async (e) => {
                    e.preventDefault();

                    const draggedId = e.dataTransfer.getData("id");
                    const targetId = widget._id;

                    if (draggedId === targetId) return;

                    const fromIndex = widgets.findIndex(w => w._id === draggedId);
                    const toIndex = widgets.findIndex(w => w._id === targetId);

                    const moved = widgets.splice(fromIndex, 1)[0];
                    widgets.splice(toIndex, 0, moved);

                    await updateLayerOrder();

                    loadWidgets();
                });

                layerItem.innerHTML = `
<div class="flex items-center gap-2 truncate">
    
    <button 
        class="visibility-btn w-7 h-7 flex items-center justify-center
        rounded-md bg-gray-800/60 hover:bg-gray-700/80
        border border-transparent hover:border-gray-600
        transition group"
    >
        ${widget.data.visible === false
                        ? `
            <!-- Eye Off -->
            <svg xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4 text-gray-500 group-hover:text-gray-300 transition"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3 3l18 18M10.73 5.08A10.94 10.94 0 0112 5c5 0 9 7 9 7a16.88 16.88 0 01-2.68 3.64M6.53 6.53A16.88 16.88 0 003 12s4 7 9 7a10.94 10.94 0 005.27-1.42"/>
            </svg>
            `
                        : `
            <!-- Eye -->
            <svg xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4 text-gray-400 group-hover:text-white transition"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M1.5 12s4-7 10.5-7 10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            `
                    }
    </button>

    <input 
        class="bg-transparent text-gray-300 focus:text-white
        outline-none w-full truncate text-sm
        border-b border-transparent focus:border-purple-500
        transition"
        value="${widget.name || widget.type}"
        data-id="${widget._id}"
    />
</div>

<button class="delete-btn w-6 h-6 flex items-center justify-center
rounded hover:bg-red-500/20 transition group">

<svg xmlns="http://www.w3.org/2000/svg"
class="w-3.5 h-3.5 text-gray-400 group-hover:text-red-400 transition"
fill="none" viewBox="0 0 24 24"
stroke="currentColor" stroke-width="2">
<path stroke-linecap="round" stroke-linejoin="round"
d="M6 7h12M9 7v12m6-12v12M10 3h4a1 1 0 011 1v2H9V4a1 1 0 011-1z" />
</svg>

</button>
`;

                layerItem.querySelector(".visibility-btn")
                    .addEventListener("click", async (e) => {
                        e.stopPropagation();

                        const newVisibility = widget.data.visible === false ? true : false;

                        await fetch(`/api/widgets/${widget._id}`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                data: {
                                    ...widget.data,
                                    visible: newVisibility
                                }
                            })
                        });

                        loadWidgets();
                    });

                layerItem.addEventListener("click", (e) => {
                    if (
                        e.target.closest(".visibility-btn") ||
                        e.target.closest(".delete-btn") ||
                        e.target.tagName === "INPUT"
                    ) return;

                    selectWidget(widget, el);
                });

                layerItem.querySelector(".delete-btn").addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectedWidget = widget;
                    deleteSelectedWidget();
                });

                layersPanel.appendChild(layerItem);

                layerItem.querySelector("input")
                    .addEventListener("input", (e) => {

                        e.stopPropagation();

                        widget.name = e.target.value;

                        if (selectedWidget && selectedWidget._id === widget._id) {
                            document.getElementById("settingsTitle").innerText =
                                widget.name || widget.type;
                        }

                        markAsChanged();
                    });

            });

            resetChanges();

        }


        document.getElementById("saveBtn").addEventListener("click", saveConfig);

        async function saveConfig() {
            if (!currentProject) return;

            const projectTitle =
                document.getElementById("projectNameInput").value;

            showSaveToast("Save...");

            try {

                await fetch(`/api/projects/${currentProject._id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: projectTitle })
                });

                for (let widget of widgets) {

                    await fetch(`/api/widgets/${widget._id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            name: widget.name,
                            data: widget.data   // 🔥 IMPORTANTE
                        })
                    });
                }

                showSaveToast("Saved ✔");
                resetChanges();
                loadWidgets();

            } catch (error) {
                console.error(error);
                showSaveToast("Error ✖");
            }
        }

        function markAsChanged() {
            if (hasUnsavedChanges) return;

            hasUnsavedChanges = true;

            const btn = document.getElementById("saveBtn");
            btn.disabled = false;
            btn.classList.remove("opacity-50", "cursor-not-allowed");
        }

        function resetChanges() {
            hasUnsavedChanges = false;

            const btn = document.getElementById("saveBtn");
            btn.disabled = true;
            btn.classList.add("opacity-50", "cursor-not-allowed");
        }

        document.getElementById("projectNameInput")
            .addEventListener("input", markAsChanged);

        /* ================= SELECT ================= */
        function showSaveToast(message) {
            const toast = document.getElementById("saveToast");

            toast.innerText = message;

            toast.classList.remove("opacity-0", "translate-y-3", "scale-95");
            toast.classList.add("opacity-100", "translate-y-0", "scale-100");

            if (message !== "Save...") {
                setTimeout(() => {
                    toast.classList.remove("opacity-100", "translate-y-0", "scale-100");
                    toast.classList.add("opacity-0", "translate-y-3", "scale-95");
                }, 3000);
            }
        }

        function selectWidget(widget, element) {

            if (selectedElement) selectedElement.style.outline = "none";

            selectedWidget = widget;
            selectedElement = element;

            element.style.outline = "2px solid #3b82f6";
            element.style.outlineOffset = "2px";

            openConfig(widget);

        }

        function showLayers() {
            document.getElementById("sidebarTitle").innerText = "Layers";

            if (selectedElement) selectedElement.style.outline = "none";
            selectedWidget = null;
            selectedElement = null;
        }

        function openConfig(widget) {

            selectedWidget = widget;

            document.getElementById("settingsOverlay").classList.remove("hidden");
            document.getElementById("settingsTitle").innerText =
                widget.name || widget.type;

            updateActiveLayer(widget._id);

            const content = document.getElementById("configContent");
            content.innerHTML = ""; // 🔥 LIMPIAR ANTES

            const widgetDef = window.WidgetRegistry[widget.type];

            if (widgetDef && widgetDef.renderConfig) {
                widgetDef.renderConfig(widget, content, updateSelectedWidget);

            }
        }

        function updateSelectedWidget(updates) {

            if (!selectedWidget || !selectedElement) return;

            // ===== 1️⃣ Actualizar memoria =====
            selectedWidget.data = {
                ...selectedWidget.data,
                ...updates
            };

            const index = widgets.findIndex(w => w._id === selectedWidget._id);
            if (index !== -1) {
                widgets[index].data = selectedWidget.data;
            }

            // ===== 2️⃣ Actualizar posición y tamaño =====
            if (updates.x !== undefined)
                selectedElement.style.left = updates.x + "px";

            if (updates.y !== undefined)
                selectedElement.style.top = updates.y + "px";

            if (updates.width !== undefined)
                selectedElement.style.width = updates.width + "px";

            if (updates.height !== undefined)
                selectedElement.style.height = updates.height + "px";

            // ===== 3️⃣ 🔥 RE-RENDER DEL WIDGET (CLAVE) =====
            const widgetDef = window.WidgetRegistry[selectedWidget.type];

            if (widgetDef && widgetDef.renderCanvas) {
                selectedElement.innerHTML = "";
                const rendered = widgetDef.renderCanvas(selectedWidget);
                selectedElement.appendChild(rendered);
            }

            // ===== 4️⃣ Sincronizar panel =====
            const panel = document.getElementById("configContent");
            if (!panel) return;

            panel.querySelectorAll("input[data-field]").forEach(input => {
                const field = input.dataset.field;
                if (selectedWidget.data[field] !== undefined) {
                    input.value = selectedWidget.data[field];
                }
            });

            panel.querySelectorAll("input[type='range']").forEach(range => {
                const span = range.parentElement.querySelector("span");
                if (span && range.dataset.field) {
                    span.innerText = selectedWidget.data[range.dataset.field];
                }
            });

            panel.querySelectorAll("[data-fit]").forEach(btn => {
                const active = btn.dataset.fit === selectedWidget.data.objectFit;
                btn.className =
                    "flex-1 py-2 rounded-md border text-xs capitalize " +
                    (active
                        ? "bg-gray-700 border-gray-600 text-white"
                        : "bg-gray-900 border-gray-700 text-gray-400 hover:text-white");
            });

            const lockBtn = panel.querySelector("#lockRatio");
            if (lockBtn) {
                lockBtn.className =
                    "flex items-center justify-center w-10 h-10 transition-colors duration-150 rounded-md border " +
                    (selectedWidget.data.lockRatio
                        ? "bg-gray-600 border-gray-500 text-white"
                        : "bg-gray-900 border-gray-700 text-gray-400 hover:text-white");
            }

            // ===== 5️⃣ Marcar cambios =====
            markAsChanged();
        }

        function closeSettings() {
            document.getElementById("settingsOverlay").classList.add("hidden");

            document.querySelectorAll("#layersPanel > div")
                .forEach(i => i.classList.remove("ring-2", "ring-purple-500"));
        }

        async function deleteSelectedWidget() {
            if (!selectedWidget) return;

            await fetch(`/api/widgets/${selectedWidget._id}`, {
                method: "DELETE"
            });

            selectedWidget = null;
            selectedElement = null;

            document.getElementById("settingsOverlay").classList.add("hidden");

            loadWidgets();
        }
        /* ================= UPDATE ================= */

        async function updateLayerOrder() {
            for (let i = 0; i < widgets.length; i++) {
                await fetch(`/api/widgets/${widgets[i]._id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        data: {
                            ...widgets[i].data,
                            zIndex: i
                        }
                    })
                });
            }
        }

        function updateActiveLayer(id) {
            document.querySelectorAll("#layersPanel > div").forEach(item => {
                item.classList.remove("ring-2", "ring-purple-500", "bg-gray-700/80");
            });

            const active = document.querySelector(`#layersPanel > div[data-id="${id}"]`);
            if (active) {
                active.classList.add("ring-2", "ring-purple-500", "bg-gray-700/80");
            }
        }
        /* ================= DRAG ================= */



        /* ================= ADD ================= */

        document.getElementById("newWidgetBtn")
            .addEventListener("click", () => {
                document.getElementById("widgetSelector").classList.toggle("hidden");
            });

        async function createWidget(type) {

            const widgetDef = window.WidgetRegistry[type];

            const defaultData = widgetDef?.defaultData || {
                x: 100,
                y: 100,
                visible: true,
                zIndex: widgets.length
            };

            await fetch("/api/widgets", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    projectId,
                    type,
                    name: type,
                    data: defaultData
                })
            });

            loadWidgets();
        }
        loadWidgets();
    </script>
</body>

</html>
