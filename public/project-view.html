<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Project Editor</title>
    <link href="/styles.css" rel="stylesheet">
    <style>
        .selected-widget {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
            transition: all 0.15s ease;
        }

        .layer-item {
            transition: background 0.15s ease;
        }

        .layer-item.active {
            background: #1f2937;
        }
    </style>
</head>

<body class="bg-gray-950 text-white overflow-hidden">

    <!-- ================= HEADER ================= -->
    <header
        class="fixed top-0 left-0 w-full h-16 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-6 z-50">

        <div class="flex items-center gap-4">

            <!-- BACK BUTTON SVG -->
            <button onclick="goBack()"
                class="text-gray-400 hover:text-white transition flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-800">

                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>

            </button>

            <!-- PROJECT NAME -->
            <input id="projectNameInput"
                class="bg-transparent border-b border-gray-600 focus:border-purple-500 outline-none text-lg w-64"
                placeholder="Untitled Overlay">

            <!-- OVERLAY URL -->
            <div>
                <span class="text-xs text-gray-400 block">Overlay URL</span>
                <input id="overlayLink" class="bg-gray-800 text-xs px-3 py-1 rounded w-[380px]" readonly>
            </div>

        </div>

        <button onclick="saveConfig()" class="bg-purple-600 hover:bg-purple-700 px-6 py-2 rounded">
            Save
        </button>

    </header>

    <!-- ================= MAIN LAYOUT ================= -->
    <div class="pt-16 h-screen flex">

        <!-- LAYERS PANEL -->
        <aside class="w-64 bg-gray-900 border-r border-gray-800 p-4 overflow-y-auto">
            <h3 class="text-sm text-gray-400 mb-3">Layers</h3>
            <div id="layersPanel" class="flex flex-col gap-1"></div>
        </aside>

        <aside id="configPanel" class="w-80 bg-gray-900 border-r border-gray-800 p-6 hidden">
            <h3 class="text-lg font-bold mb-6">Settings</h3>
            <div id="configContent"></div>
        </aside>

        <!-- CANVAS -->
        <main class="flex-1 relative bg-white overflow-hidden" style="background-image: radial-gradient(#d1d5db 1px, transparent 1px);
                   background-size: 20px 20px;">

            <div id="canvas" class="w-full h-full relative"></div>

            <!-- FLOATING + BUTTON SVG -->
            <button id="newWidgetBtn"
                class="fixed bottom-8 left-1/2 -translate-x-1/2 w-16 h-16 bg-purple-600 hover:bg-purple-700 rounded-full shadow-2xl flex items-center justify-center z-40">

                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>

            </button>

            <!-- FLOATING MENU -->
            <div id="widgetSelector"
                class="hidden fixed bottom-28 left-1/2 -translate-x-1/2 bg-gray-900 border border-gray-700 rounded-xl shadow-xl p-4 flex flex-col gap-2 w-56 z-40">

                <!-- TEXT -->
                <div onclick="createWidget('text')"
                    class="flex items-center gap-3 p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">

                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-purple-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16M4 12h10M4 17h16" />
                    </svg>

                    <span>Text</span>
                </div>

                <!-- IMAGE -->
                <div onclick="createWidget('image')"
                    class="flex items-center gap-3 p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">

                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-purple-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 7a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 11l2 2 4-4 5 5" />
                    </svg>

                    <span>Image</span>
                </div>

                <!-- SHOUTOUT -->
                <div onclick="createWidget('shoutout')"
                    class="flex items-center gap-3 p-2 bg-gray-800 hover:bg-gray-700 rounded cursor-pointer">

                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-purple-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14m-6 0H5a2 2 0 01-2-2V8a2 2 0 012-2h4l6-3v14l-6-3z" />
                    </svg>

                    <span>Shoutout</span>
                </div>

            </div>

        </main>
    </div>

    <script>

        const projectId = window.location.pathname.split("/").pop();

        document.getElementById("overlayLink").value =
            window.location.origin + "/overlay/" + projectId;

        function goBack() {
            window.location.href = "/project.html";
        }

        let widgets = [];
        let selectedWidget = null;
        let selectedElement = null;

        // ================= LOAD PROJECT =================

        async function loadProject() {
            const res = await fetch("/api/projects");
            const projects = await res.json();
            const project = projects.find(p => p._id === projectId);

            if (project) {
                document.getElementById("projectNameInput").value = project.name;
            }
        }

        // ================= LOAD WIDGETS =================

        async function loadWidgets() {
            const res = await fetch(`/api/widgets/${projectId}`);
            widgets = await res.json();

            const canvas = document.getElementById("canvas");
            canvas.innerHTML = "";

            const layersPanel = document.getElementById("layersPanel");
            layersPanel.innerHTML = "";

            widgets.forEach(widget => {

                const el = document.createElement("div");

                if (widget.type === "text") {
                    el.innerText = widget.data.text || "Sample Text";
                }

                if (widget.type === "image") {
                    const img = document.createElement("img");
                    img.src = widget.data.url || "https://via.placeholder.com/150";
                    img.style.width = (widget.data.width || 150) + "px";
                    img.style.height = (widget.data.height || 150) + "px";
                    el.appendChild(img);
                }

                if (widget.type === "shoutout") {
                    el.innerText = "🎬 ShoutOut Widget";
                    el.style.border = "2px solid purple";
                    el.style.padding = "8px 12px";
                    el.style.background = "rgba(128,0,128,0.1)";
                }

                el.className = "absolute cursor-move select-none";
                el.style.left = (widget.data.x || 100) + "px";
                el.style.top = (widget.data.y || 100) + "px";
                el.style.color = widget.data.color ?? "#000000";
                el.style.fontSize = (widget.data.fontSize || 32) + "px";

                enableDrag(el, widget);

                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    selectWidget(widget, el);
                });

                canvas.appendChild(el);
                // === CREATE LAYER ITEM ===
                const layerItem = document.createElement("div");
                layerItem.className =
                    "layer-item flex items-center justify-between px-3 py-2 rounded cursor-pointer bg-gray-800 hover:bg-gray-700 text-sm";

                layerItem.dataset.id = widget._id;

                // Click para seleccionar desde layers
                layerItem.addEventListener("click", (e) => {
                    if (e.target.tagName === "BUTTON") return;
                    selectWidget(widget, el);
                    updateActiveLayer(widget._id);
                });

                // Botón delete
                layerItem.querySelector("button").addEventListener("click", async (e) => {
                    e.stopPropagation();

                    await fetch(`/api/widgets/${widget._id}`, {
                        method: "DELETE"
                    });

                    loadWidgets();
                });

                layersPanel.appendChild(layerItem);
            });
        }

        // ================= SELECT SYSTEM =================

        function selectWidget(widget, element) {

            if (selectedElement) {
                selectedElement.style.outline = "none";
            }

            selectedWidget = widget;
            selectedElement = element;

            element.style.outline = "2px solid #3b82f6"; // azul tipo Figma
            element.style.outlineOffset = "2px";

            openConfig(widget);
            updateActiveLayer(widget._id);
        }

        function updateActiveLayer(id) {
            document.querySelectorAll(".layer-item").forEach(item => {
                item.classList.remove("active");
            });

            const active = document.querySelector(`.layer-item[data-id="${id}"]`);
            if (active) active.classList.add("active");
        }

        document.getElementById("canvas").addEventListener("click", () => {
            if (selectedElement) {
                selectedElement.style.outline = "none";
            }
            selectedWidget = null;
            selectedElement = null;
            document.getElementById("configPanel").classList.add("hidden");
        });

        // ================= DRAG SYSTEM =================

        function enableDrag(element, widget) {

            let offsetX, offsetY, isDragging = false;

            element.addEventListener("mousedown", (e) => {
                isDragging = true;
                offsetX = e.offsetX;
                offsetY = e.offsetY;
            });

            document.addEventListener("mousemove", (e) => {
                if (!isDragging) return;

                const canvasRect = document.getElementById("canvas").getBoundingClientRect();
                let x = e.clientX - canvasRect.left - offsetX;
                let y = e.clientY - canvasRect.top - offsetY;

                element.style.left = x + "px";
                element.style.top = y + "px";
            });

            document.addEventListener("mouseup", async () => {
                if (!isDragging) return;
                isDragging = false;

                const x = parseInt(element.style.left);
                const y = parseInt(element.style.top);

                await fetch(`/api/widgets/${widget._id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        data: {
                            ...widget.data,
                            x,
                            y
                        }
                    })
                });

                widget.data.x = x;
                widget.data.y = y;
            });
        }

        // ================= CONFIG PANEL =================

        function openConfig(widget) {

            selectedWidget = widget;

            const panel = document.getElementById("configPanel");
            const content = document.getElementById("configContent");

            panel.classList.remove("hidden");

            if (widget.type === "shoutout") {

                content.innerHTML = `
                    <label class="block mb-2 text-sm">Command</label>
                    <input id="cfgCommand"
                        class="w-full mb-4 p-2 bg-gray-800 rounded"
                        value="${widget.data.command || "!so"}">

                    <label class="block mb-2 text-sm">Chat Message Template</label>
                    <textarea id="cfgTemplate"
                        class="w-full mb-4 p-2 bg-gray-800 rounded">${widget.data.textTemplate || ""}</textarea>

                    <label class="block mb-2 text-sm">Duration (ms)</label>
                    <input id="cfgDuration"
                        type="number"
                        class="w-full mb-4 p-2 bg-gray-800 rounded"
                        value="${widget.data.duration || 10000}">

                    <label class="block mb-2 text-sm">Overlay Text</label>
                    <input id="cfgOverlayText"
                        class="w-full mb-4 p-2 bg-gray-800 rounded"
                        value="${widget.data.overlayText || ""}">

                    <label class="block mb-2 text-sm">Animation In</label>
                    <select id="cfgAnimIn"
                        class="w-full mb-4 p-2 bg-gray-800 rounded">
                        <option value="fade">Fade</option>
                        <option value="zoom">Zoom</option>
                        <option value="slide">Slide</option>
                    </select>

                    <label class="block mb-2 text-sm">Animation Out</label>
                    <select id="cfgAnimOut"
                        class="w-full mb-4 p-2 bg-gray-800 rounded">
                        <option value="fade">Fade</option>
                        <option value="zoom">Zoom</option>
                        <option value="slide">Slide</option>
                    </select>
                `;

                setTimeout(() => {
                    document.getElementById("cfgAnimIn").value =
                        widget.data.animationIn || "fade";
                    document.getElementById("cfgAnimOut").value =
                        widget.data.animationOut || "fade";
                });
            }
        }

        async function updateSelectedWidget(dataUpdates) {
            if (!selectedWidget) return;

            const updatedData = {
                ...selectedWidget.data,
                ...dataUpdates
            };

            const res = await fetch(`/api/widgets/${selectedWidget._id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    data: updatedData
                })
            });

            const updated = await res.json();
            selectedWidget = updated;

            loadWidgets();
        }

        // ================= DELETE =================

        async function deleteSelectedWidget() {
            if (!selectedWidget) return;

            await fetch(`/api/widgets/${selectedWidget._id}`, {
                method: "DELETE"
            });

            selectedWidget = null;
            selectedElement = null;
            document.getElementById("configPanel").classList.add("hidden");

            loadWidgets();
        }

        // ================= DUPLICATE (CTRL + D) =================

        document.addEventListener("keydown", async (e) => {

            if (e.ctrlKey && e.key === "d") {
                e.preventDefault();

                if (!selectedWidget) return;

                await fetch("/api/widgets", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        projectId,
                        type: selectedWidget.type,
                        data: {
                            ...selectedWidget.data,
                            x: (selectedWidget.data.x || 100) + 20,
                            y: (selectedWidget.data.y || 100) + 20
                        }
                    })
                });

                loadWidgets();
            }
        });

        // ================= SAVE =================

        async function saveConfig() {

            const newName = document.getElementById("projectNameInput").value;

            await fetch(`/api/projects/${projectId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: newName })
            });

            await loadWidgets();
        }

        // ================= ADD WIDGET =================

        document.getElementById("newWidgetBtn")
            .addEventListener("click", () => {
                document.getElementById("widgetSelector")
                    .classList.toggle("hidden");
            });

        async function createWidget(type) {
            document.getElementById("widgetSelector").classList.add("hidden");

            const res = await fetch("/api/widgets", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ projectId, type })
            });

            await res.json();
            loadWidgets();
        }

        loadProject();
        loadWidgets();

    </script>

</body>

</html>
